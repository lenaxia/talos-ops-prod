# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-4.6.2/charts/other/app-template/values.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &appname immich
  namespace: &namespace media
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 4.3.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    createNamespace: true
    timeout: 15m
    remediation:
      retries: 5
  upgrade:
    timeout: 15m
    remediation:
      retries: 5
  values:
    defaultPodOptions:
      nodeSelector:
        node-role.kubernetes.io/worker: "true"

    controllers:
      server:
        type: deployment
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/onedr0p/postgres-init
              tag: 17.4
            env:
              - name: INIT_POSTGRES_HOST
                valueFrom:
                  secretKeyRef:
                    name: *appname
                    key: DB_HOSTNAME
              - name: INIT_POSTGRES_DBNAME
                valueFrom:
                  secretKeyRef:
                    name: *appname
                    key: DB_DATABASE_NAME
              - name: INIT_POSTGRES_SUPER_PASS
                valueFrom:
                  secretKeyRef:
                    name: postgres-superuser
                    key: password
              - name: INIT_POSTGRES_USER
                valueFrom:
                  secretKeyRef:
                    name: *appname
                    key: DB_USERNAME
              - name: INIT_POSTGRES_PASS
                valueFrom:
                  secretKeyRef:
                    name: *appname
                    key: DB_PASSWORD
        containers:
          server:
            image:
              repository: ghcr.io/immich-app/immich-server
              tag: v1.131.3
            env:
              TZ: ${TIMEZONE}
              IMMICH_LOG_LEVEL: log
              IMMICH_MEDIA_LOCATION: /usr/src/app/upload
              # OIDC via Authelia
              IMMICH_OAUTH_ENABLED: "true"
              IMMICH_OAUTH_ISSUER_URL: https://authelia.${SECRET_DEV_DOMAIN}
              IMMICH_OAUTH_CLIENT_ID: immich
              IMMICH_OAUTH_SCOPE: "openid email profile"
              IMMICH_OAUTH_AUTO_REGISTER: "true"
              IMMICH_OAUTH_AUTO_LAUNCH: "false"
              IMMICH_OAUTH_BUTTON_TEXT: Sign in with Authelia
              IMMICH_OAUTH_MOBILE_REDIRECT_URI: https://immich.${SECRET_DEV_DOMAIN}/api/oauth/mobile-redirect
              IMMICH_OAUTH_MOBILE_OVERRIDE_REDIRECT_URI: "true"
            envFrom:
              - secretRef:
                  name: *appname
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 4Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/server/ping
                    port: 2283
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/server/ping
                    port: 2283
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  failureThreshold: 10

      machine-learning:
        type: deployment
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          machine-learning:
            image:
              repository: ghcr.io/immich-app/immich-machine-learning
              tag: v1.131.3
            env:
              TZ: ${TIMEZONE}
              IMMICH_LOG_LEVEL: log
              MPLCONFIGDIR: /tmp/matplotlib
            envFrom:
              - secretRef:
                  name: *appname
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 4Gi

    service:
      server:
        controller: server
        primary: true
        ports:
          http:
            port: 2283
      machine-learning:
        controller: machine-learning
        ports:
          http:
            port: 3003

    ingress:
      server:
        enabled: true
        className: traefik
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-production
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
          # No Authelia middleware — Immich handles its own OIDC auth
          traefik.ingress.kubernetes.io/router.middlewares: networking-chain-no-auth@kubernetescrd
          # Large file uploads (photos/videos)
          traefik.ingress.kubernetes.io/router.priority: "1"
          traefik.ingress.kubernetes.io/proxy-body-size: "0"
          nginx.ingress.kubernetes.io/proxy-body-size: "0"
          hajimari.io/enable: "true"
          hajimari.io/icon: image-multiple
          hajimari.io/group: Home
          hajimari.io/info: Immich - Photo & Video Backup
        hosts:
          - host: &uri immich.${SECRET_DEV_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: server
                  port: http
        tls:
          - hosts:
              - *uri
            secretName: *uri

    persistence:
      upload:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 100Gi
        storageClass: longhorn
        retain: true
        globalMounts:
          - path: /usr/src/app/upload
      ml-cache:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 10Gi
        storageClass: longhorn
        retain: true
        advancedMounts:
          machine-learning:
            machine-learning:
              - path: /cache
