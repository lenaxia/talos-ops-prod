---
apiVersion: v1
kind: Secret
metadata:
  name: hortusfox
  namespace: home
type: Opaque
stringData:
  # Database password — must match the hortusfox-password key in
  # kubernetes/apps/databases/mariadb-operator/instances/secret.sops.yaml
  DB_PASSWORD: PLACEHOLDER_CHANGE_ME

  # Admin account credentials for first-time setup
  APP_ADMIN_EMAIL: admin@example.com
  APP_ADMIN_PASSWORD: PLACEHOLDER_CHANGE_ME

  # Cronjob authentication token (set in admin dashboard > settings)
  CRONPW: PLACEHOLDER_CHANGE_ME
