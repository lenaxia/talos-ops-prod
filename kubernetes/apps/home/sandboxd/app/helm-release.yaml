# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-4.6.2/charts/other/app-template/values.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app sandboxd
  namespace: home
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    defaultPodOptions:
      nodeSelector:
        node-role.kubernetes.io/worker: 'true'
    controllers:
      main:
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: 'true'
        containers:
          main:
            image:
              # TODO(confirm): upstream builds images locally via install.sh
              # (sandboxd-control-plane:0.3.0 in docker-compose.yml). No public
              # registry image confirmed yet — see PR description.
              repository: ghcr.io/tastyeffectco/sandboxd-control-plane
              tag: 0.3.0
            env:
              TZ: ${TIMEZONE}
              # --- core ---
              PREVIEW_DOMAIN: app.${SECRET_DEV_DOMAIN}
              SANDBOXD_IMAGE: sandboxd-base:0.3.0
              SANDBOXD_NETWORK: sandboxd_net
              SANDBOXD_USERNS: host
              SANDBOXD_DEFAULT_AGENT: opencode
              SANDBOXD_OPENCODE_ZEN_PATH: zen
              SANDBOXD_DATA_DIR: /var/lib/sandboxed
              SANDBOXD_LOG_DIR: /var/lib/sandboxed/log
              SANDBOXD_ACCESS_LOG: /var/lib/sandboxed/log/traefik-access.log
              # --- routing ---
              PREVIEW_ENTRYPOINT: web
              PREVIEW_TLS: 'false'
              SANDBOXD_PUBLIC_HTTP_PORT: '80'
              # --- auth (kept on; tokens seeded from secret) ---
              SANDBOXD_API_AUTH_DISABLED: 'false'
              SANDBOXD_API_BIND: 0.0.0.0:9000
              # --- idle lifecycle ---
              SANDBOXD_IDLE_THRESHOLD_SECONDS: '2100'
            envFrom:
              - secretRef:
                  name: *app
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi
            securityContext:
              # Needs root: talks to the host Docker socket and owns the
              # bind-mounted data dir. Matches `userns_mode: host` upstream.
              runAsUser: 0
              runAsGroup: 0
    service:
      main:
        primary: true
        ports:
          http:
            port: 9000
    ingress:
      main:
        enabled: true
        className: traefik
        annotations:
          hajimari.io/enable: 'true'
          hajimari.io/icon: robot-outline
          hajimari.io/appName: sandboxd
          hajimari.io/group: Home
          cert-manager.io/cluster-issuer: letsencrypt-production
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
          traefik.ingress.kubernetes.io/router.middlewares: networking-chain-authelia@kubernetescrd
        hosts:
          - host: &uri app.${SECRET_DEV_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: http
        tls:
          - hosts:
              - *uri
            secretName: *uri
    persistence:
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 50Gi
        storageClass: longhorn
        retain: true
        advancedMounts:
          main:
            main:
              - path: /var/lib/sandboxed
      docker-socket:
        type: hostPath
        hostPath: /var/run/docker.sock
        hostPathType: Socket
        globalMounts:
          - path: /var/run/docker.sock
