---
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: sandboxd
  namespace: home
stringData:
  # PLACEHOLDER values — replace with real values, then encrypt in place:
  #   sops -e -i kubernetes/apps/home/sandboxd/app/secret.sops.yaml
  #
  # After encryption every value under stringData MUST be ENC[...] and the
  # `sops:` block MUST be present at the bottom of the file before committing.
  #
  # Format: NAME=sk_...  (comma-separated for multiple keys)
  SANDBOXD_API_TOKENS: PLACEHOLDER-default=sk_REPLACE_ME
  # base64 of 32 random bytes; treat as unrecoverable once app secrets exist.
  SANDBOXD_SECRETS_KEY: PLACEHOLDER
