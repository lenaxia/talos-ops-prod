# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-4.6.2/charts/other/app-template/values.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &appname f1replaytiming
  namespace: &namespace home
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 4.3.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  values:
    defaultPodOptions:
      nodeSelector:
        node-role.kubernetes.io/worker: "true"

    controllers:
      backend:
        type: deployment
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          main:
            image:
              repository: ghcr.io/adn8naiagent/f1replaytiming-backend
              tag: 1.3.2
            env:
              TZ: ${TIMEZONE}
              FRONTEND_URL: https://f1.${SECRET_DEV_DOMAIN}
              DATA_DIR: /data
              AUTH_ENABLED: "false"
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi

      frontend:
        type: deployment
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          main:
            image:
              repository: ghcr.io/adn8naiagent/f1replaytiming-frontend
              tag: 1.2.1
            env:
              TZ: ${TIMEZONE}
              NEXT_PUBLIC_API_URL: https://f1-api.${SECRET_DEV_DOMAIN}
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 512Mi

    service:
      backend:
        controller: backend
        primary: true
        ports:
          http:
            port: 8000
      frontend:
        controller: frontend
        ports:
          http:
            port: 3000

    ingress:
      frontend:
        enabled: true
        className: traefik
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-production
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
          traefik.ingress.kubernetes.io/router.middlewares: networking-chain-authelia@kubernetescrd
          hajimari.io/enable: "true"
          hajimari.io/icon: racing-helmet
          hajimari.io/group: Home
          hajimari.io/info: F1 Replay Timing
        hosts:
          - host: &frontend-uri f1.${SECRET_DEV_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: frontend
                  port: http
        tls:
          - hosts:
              - *frontend-uri
            secretName: *frontend-uri

      backend:
        enabled: true
        className: traefik
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-production
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
          traefik.ingress.kubernetes.io/router.middlewares: networking-chain-no-auth@kubernetescrd
        hosts:
          - host: &backend-uri f1-api.${SECRET_DEV_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: backend
                  port: http
        tls:
          - hosts:
              - *backend-uri
            secretName: *backend-uri

    persistence:
      data:
        type: persistentVolumeClaim
        existingClaim: f1replaytiming-data
        advancedMounts:
          backend:
            main:
              - path: /data
      cache:
        type: emptyDir
        advancedMounts:
          backend:
            main:
              - path: /data/fastf1-cache
