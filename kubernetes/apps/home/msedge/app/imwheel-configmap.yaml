apiVersion: v1
kind: ConfigMap
metadata:
  name: msedge-imwheel
  namespace: home
data:
  # Runs at container start (before services) — writes .imwheelrc for the abc user
  imwheel-setup.sh: |
    #!/bin/bash
    # Write imwheel config to the abc user's home dir (/config)
    # REPS=1 means 1 line per scroll tick — reduces the default aggressive acceleration
    cat > /config/.imwheelrc << 'EOF'
    "."
    None, Up,   Button4, 1
    None, Down, Button5, 1
    Control_L, Up,   Control_L|Button4
    Control_L, Down, Control_L|Button5
    Shift_L,   Up,   Shift_L|Button4
    Shift_L,   Down, Shift_L|Button5
    EOF
    chown abc:abc /config/.imwheelrc
    echo "**** imwheel config written ****"

  # Persistent daemon — s6 will restart this if it exits
  imwheel-service: |
    #!/usr/bin/with-contenv bash
    exec imwheel -d -b "4 5" -f
