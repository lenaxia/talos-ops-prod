# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &appname vllm
  namespace: &namespace home
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 4.3.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    createNamespace: true
    timeout: 30m
    remediation:
      retries: 5
  upgrade:
    timeout: 30m
    remediation:
      retries: 5
  values:
    defaultPodOptions:
      nodeSelector:
        node-role.kubernetes.io/worker: 'true'
      tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "special"
          effect: "NoSchedule"
    controllers:
      app:
        type: deployment
        annotations:
          reloader.stakater.com/auto: 'true'
        containers:
          app:
            image:
              repository: vllm/vllm-openai
              # renovate: depName=vllm/vllm-openai
              tag: v0.19.1-cu130-ubuntu2404@sha256:f35754668e5f7b82809f080da5491224fce37869fce6b6d4174b2675c4ab16c1
            command: ["/bin/sh", "-c"]
            args:
               - |
                  vllm serve \
                      Lorbus/Qwen3.6-27B-int4-AutoRound \
                      --served-model-name qwen3 \
                      --dtype half \
                      --max-model-len 262144 \
                      --gpu-memory-utilization 0.90 \
                      --tensor-parallel-size 1 \
                      --max-num-seqs 3 \
                      --trust-remote-code \
                      --disable-log-requests \
                      --host 0.0.0.0 \
                      --enable-chunked-prefill \
                      --enable-prefix-caching \
                      --kv-cache-dtype fp8 \
                      --enable-auto-tool-choice \
                      --tool-call-parser hermes \
                      --reasoning-parser qwen3 \
                      --compilation-config.cudagraph_mode none \
                      --speculative-config '{"method":"mtp","num_speculative_tokens":3}' \
                      --port 8000
            env:
              - name: TZ
                value: ${TIMEZONE}
              - name: NVIDIA_VISIBLE_DEVICES
                value: "GPU-ec4bf65c-4e9e-b857-11e7-bcc716f11d93" # 4090
              - name: VLLM_USE_FLASHINFER_SAMPLER
                value: "1"
              - name: PYTORCH_CUDA_ALLOC_CONF
                value: "expandable_segments:True,max_split_size_mb:512"
            envFrom:
              - secretRef:
                  name: *appname
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8000
                  initialDelaySeconds: 120
                  periodSeconds: 20
                  successThreshold: 1
                  failureThreshold: 5
                  timeoutSeconds: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8000
                  initialDelaySeconds: 90
                  periodSeconds: 10
                  successThreshold: 1
                  failureThreshold: 3
                  timeoutSeconds: 5
            resources:
              requests:
                nvidia.com/gpu: "1"
              limits:
                nvidia.com/gpu: "1"

    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        storageClass: openebs-hostpath
        accessMode: ReadWriteOnce
        size: 50Gi
        globalMounts:
          - path: /root/.cache/huggingface
      shm:
        type: emptyDir
        medium: Memory
        sizeLimit: 8Gi
        globalMounts:
          - path: /dev/shm
    service:
      app:
        ports:
          http:
            port: 8000
        primary: true
        type: LoadBalancer
    # podSecurityContext:
    #   runAsUser: 1000
    #   runAsGroup: 1000
    #   fsGroup: 1000
    #   fsGroupChangePolicy: "OnRootMismatch"
