apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fish-speech-checkpoints
  namespace: home
  labels:
    app.kubernetes.io/name: fish-speech
    app.kubernetes.io/instance: fish-speech
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: longhorn
