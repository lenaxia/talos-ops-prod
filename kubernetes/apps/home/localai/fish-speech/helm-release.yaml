# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &appname fish-speech
  namespace: &namespace home
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 4.3.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    createNamespace: true
    timeout: 15m
    remediation:
      retries: 3
  upgrade:
    timeout: 15m
    remediation:
      retries: 3
  values:
    defaultPodOptions:
      nodeSelector:
        node-role.kubernetes.io/worker: 'true'
      tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "special"
          effect: "NoSchedule"
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    controllers:
      app:
        type: deployment
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: 'true'
        initContainers:
          download-checkpoints:
            image:
              repository: huggingface/downloader
              tag: 0.17.3
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -e
                DEST=/app/checkpoints/s2-pro
                DONE_FLAG="$DEST/.done"
                # Verify all shards from the index are present before trusting .done
                verify_shards() {
                  if [ ! -f "$DEST/model.safetensors.index.json" ]; then return 1; fi
                  python3 -c "
                import json, sys, os
                idx = json.load(open('$DEST/model.safetensors.index.json'))
                shards = set(idx['weight_map'].values())
                missing = [s for s in shards if not os.path.exists('$DEST/' + s)]
                if missing:
                    print('Missing shards:', missing)
                    sys.exit(1)
                print('All shards present:', shards)
                  "
                }
                if [ -f "$DONE_FLAG" ] && verify_shards; then
                  echo "Checkpoints already complete, skipping download."
                  exit 0
                fi
                echo "Downloading fishaudio/s2-pro checkpoints..."
                rm -f "$DONE_FLAG"
                huggingface-cli download fishaudio/s2-pro \
                  --local-dir /app/checkpoints/s2-pro \
                  --local-dir-use-symlinks False
                touch /app/checkpoints/s2-pro/.done
                echo "Download complete."
            env:
              - name: HF_HOME
                value: /app/checkpoints/.hf-cache
        containers:
          app:
            image:
              repository: fishaudio/fish-speech
              # renovate: depName=fishaudio/fish-speech
              tag: server-cuda
            env:
              - name: COMPILE
                value: "0"
              - name: NVIDIA_VISIBLE_DEVICES
                value: "GPU-6726851a-d64e-09c8-a938-1537593e3106" # RTX 3090 (freed from vllm-classifier)
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /v1/health
                    port: 8080
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  failureThreshold: 5
                  timeoutSeconds: 10
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /v1/health
                    port: 8080
                  initialDelaySeconds: 60
                  periodSeconds: 15
                  failureThreshold: 3
                  timeoutSeconds: 10
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /v1/health
                    port: 8080
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  failureThreshold: 30
                  timeoutSeconds: 10
            resources:
              requests:
                nvidia.com/gpu: "1"
                memory: "8Gi"
              limits:
                nvidia.com/gpu: "1"
                memory: "22Gi"

    persistence:
      checkpoints:
        enabled: true
        type: persistentVolumeClaim
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 50Gi
        globalMounts:
          - path: /app/checkpoints
      references:
        enabled: true
        type: persistentVolumeClaim
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 5Gi
        globalMounts:
          - path: /app/references
      shm:
        type: emptyDir
        medium: Memory
        sizeLimit: 4Gi
        globalMounts:
          - path: /dev/shm

    service:
      app:
        ports:
          http:
            port: 8080
        primary: true
        type: LoadBalancer
        loadBalancerIP: ${SVC_FISH_SPEECH_ADDR}
