# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &appname fish-speech
  namespace: &namespace home
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 4.3.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    createNamespace: true
    timeout: 30m
    remediation:
      retries: 5
  upgrade:
    timeout: 30m
    remediation:
      retries: 5
  values:
    defaultPodOptions:
      nodeSelector:
        node-role.kubernetes.io/worker: 'true'
      tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "special"
          effect: "NoSchedule"

    controllers:
      app:
        type: deployment
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: 'true'
        containers:
          app:
            image:
              repository: frankleeeee/sglang-omni
              # renovate: depName=frankleeeee/sglang-omni
              tag: dev
            command: ["/bin/sh", "-c"]
            args:
              - |
                cat > /tmp/s2pro_tts.yaml << 'EOF'
                config_cls: S2ProPipelineConfig
                model_path: fishaudio/s2-pro
                relay_backend: shm
                EOF
                sgl-omni serve \
                  --model-path fishaudio/s2-pro \
                  --config /tmp/s2pro_tts.yaml \
                  --port 8000
            env:
              - name: TZ
                value: ${TIMEZONE}
              - name: NVIDIA_VISIBLE_DEVICES
                value: "GPU-6726851a-d64e-09c8-a938-1537593e3106" # RTX 3090 (freed from vllm-classifier)
              - name: HF_HOME
                value: /root/.cache/huggingface
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
            resources:
              requests:
                nvidia.com/gpu: "1"
                memory: "16Gi"
              limits:
                nvidia.com/gpu: "1"
                memory: "22Gi"

    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        storageClass: openebs-hostpath
        accessMode: ReadWriteOnce
        size: 30Gi
        globalMounts:
          - path: /root/.cache/huggingface
      shm:
        type: emptyDir
        medium: Memory
        sizeLimit: 8Gi
        globalMounts:
          - path: /dev/shm

    service:
      app:
        ports:
          http:
            port: 8000
        primary: true
        type: LoadBalancer
        loadBalancerIP: ${SVC_FISH_SPEECH_ADDR}
