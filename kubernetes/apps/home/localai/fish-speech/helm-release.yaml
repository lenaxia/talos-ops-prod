# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &appname fish-speech
  namespace: &namespace home
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 4.3.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    createNamespace: true
    timeout: 15m
    remediation:
      retries: 3
  upgrade:
    timeout: 15m
    remediation:
      retries: 3
  values:
    defaultPodOptions:
      nodeSelector:
        node-role.kubernetes.io/worker: 'true'
        nvidia.com/cuda.driver-version.major: "580"
      tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "special"
          effect: "NoSchedule"
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    controllers:
      app:
        type: deployment
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: 'true'
        initContainers:
          download-checkpoints:
            image:
              repository: huggingface/downloader
              tag: 0.17.3
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -e
                DEST=/app/checkpoints/s2-pro
                DONE_FLAG="$DEST/.done"
                verify_shards() {
                  if [ ! -f "$DEST/model.safetensors.index.json" ]; then return 1; fi
                  python3 -c "
                import json, sys, os
                idx = json.load(open('$DEST/model.safetensors.index.json'))
                shards = set(idx['weight_map'].values())
                missing = [s for s in shards if not os.path.exists('$DEST/' + s)]
                if missing:
                    print('Missing shards:', missing)
                    sys.exit(1)
                print('All shards present:', shards)
                  "
                }
                if [ -f "$DONE_FLAG" ] && verify_shards; then
                  echo "Checkpoints already complete, skipping download."
                  exit 0
                fi
                echo "Downloading fishaudio/s2-pro checkpoints..."
                rm -f "$DONE_FLAG"
                huggingface-cli download fishaudio/s2-pro \
                  --local-dir /app/checkpoints/s2-pro \
                  --local-dir-use-symlinks False
                touch /app/checkpoints/s2-pro/.done
                echo "Download complete."
            env:
              - name: HF_HOME
                value: /app/checkpoints/.hf-cache
        containers:
          app:
            image:
              repository: fishaudio/fish-speech
              # renovate: depName=fishaudio/fish-speech
              tag: server-cuda
            env:
              - name: COMPILE
                value: "0"
            lifecycle:
              postStart:
                exec:
                  command:
                    - /bin/sh
                    - -c
                    - |
                      sed -i 's/import torchaudio.io._load_audio_fileobj/import torchaudio.io._load_audio_fileobj as _torchaudio_fileobj/' \
                        /app/fish_speech/inference_engine/reference_loader.py
                      find /app/fish_speech/inference_engine -name "*.pyc" -delete
                      find /app/fish_speech/inference_engine -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /v1/health
                    port: 8080
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  failureThreshold: 5
                  timeoutSeconds: 10
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /v1/health
                    port: 8080
                  initialDelaySeconds: 60
                  periodSeconds: 15
                  failureThreshold: 3
                  timeoutSeconds: 10
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /v1/health
                    port: 8080
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  failureThreshold: 30
                  timeoutSeconds: 10
            resources:
              requests:
                nvidia.com/gpu: "1"
                memory: "8Gi"
              limits:
                nvidia.com/gpu: "1"
                memory: "22Gi"
          shim:
            image:
              repository: python
              tag: 3.14-slim
            command: [python, /shim/shim.py]
            env:
              - name: FISH_SPEECH_URL
                value: http://localhost:8080/v1/tts
              - name: PORT
                value: "8081"
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 128Mi

    configMaps:
      shim:
        enabled: true
        data:
          shim.py: |
            """
            OpenAI /v1/audio/speech -> fish-speech /v1/tts shim.
            Accepts: POST /v1/audio/speech  {input, voice, model, speed, response_format}
            Forwards: POST fish-speech /v1/tts  {text, format, reference_id}
            """
            import json
            import os
            import urllib.request
            import urllib.error
            from http.server import BaseHTTPRequestHandler, HTTPServer

            FISH_URL = os.environ.get("FISH_SPEECH_URL", "http://localhost:8080/v1/tts")
            PORT = int(os.environ.get("PORT", "8081"))

            FORMAT_MAP = {"mp3": "mp3", "opus": "opus", "wav": "wav", "pcm": "pcm", "aac": "wav", "flac": "wav"}

            class Handler(BaseHTTPRequestHandler):
                def log_message(self, fmt, *args):
                    pass  # suppress access logs

                def do_GET(self):
                    if self.path == "/v1/health":
                        self.send_response(200)
                        self.send_header("Content-Type", "application/json")
                        self.end_headers()
                        self.wfile.write(b'{"status":"ok"}')
                    else:
                        self.send_response(404)
                        self.end_headers()

                def do_POST(self):
                    if self.path not in ("/v1/audio/speech", "/audio/speech"):
                        self.send_response(404)
                        self.end_headers()
                        return
                    length = int(self.headers.get("Content-Length", 0))
                    body = json.loads(self.rfile.read(length))

                    fmt = FORMAT_MAP.get(body.get("response_format", "mp3"), "mp3")
                    payload = {
                        "text": body.get("input", ""),
                        "format": fmt,
                        "latency": "normal",
                    }
                    # map voice to reference_id if not a standard openai voice name
                    voice = body.get("voice", "")
                    if voice and voice not in ("alloy", "echo", "fable", "onyx", "nova", "shimmer"):
                        payload["reference_id"] = voice

                    data = json.dumps(payload).encode()
                    req = urllib.request.Request(FISH_URL, data=data, headers={"Content-Type": "application/json"})
                    try:
                        with urllib.request.urlopen(req, timeout=120) as resp:
                            audio = resp.read()
                            ct = resp.headers.get("Content-Type", f"audio/{fmt}")
                        self.send_response(200)
                        self.send_header("Content-Type", ct)
                        self.send_header("Content-Length", str(len(audio)))
                        self.end_headers()
                        self.wfile.write(audio)
                    except urllib.error.HTTPError as e:
                        err = e.read().decode()
                        self.send_response(e.code)
                        self.send_header("Content-Type", "application/json")
                        self.end_headers()
                        self.wfile.write(json.dumps({"error": err}).encode())
                    except Exception as e:
                        self.send_response(502)
                        self.send_header("Content-Type", "application/json")
                        self.end_headers()
                        self.wfile.write(json.dumps({"error": str(e)}).encode())

            if __name__ == "__main__":
                print(f"fish-speech OpenAI shim listening on :{PORT} -> {FISH_URL}")
                HTTPServer(("0.0.0.0", PORT), Handler).serve_forever()

    persistence:
      checkpoints:
        enabled: true
        type: persistentVolumeClaim
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 50Gi
        advancedMounts:
          app:
            download-checkpoints:
              - path: /app/checkpoints
            app:
              - path: /app/checkpoints
      references:
        enabled: true
        type: persistentVolumeClaim
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 5Gi
        advancedMounts:
          app:
            app:
              - path: /app/references
      shm:
        type: emptyDir
        medium: Memory
        sizeLimit: 4Gi
        advancedMounts:
          app:
            app:
              - path: /dev/shm
      shim-code:
        type: configMap
        name: fish-speech
        advancedMounts:
          app:
            shim:
              - path: /shim

    service:
      app:
        controller: app
        primary: true
        type: LoadBalancer
        loadBalancerIP: ${SVC_FISH_SPEECH_ADDR}
        ports:
          http:
            port: 8080
          openai:
            port: 8081
