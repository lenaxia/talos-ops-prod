# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &appname dawarich
  namespace: &namespace home
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 4.3.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    createNamespace: true
    timeout: 15m
    remediation:
      retries: 5
  upgrade:
    timeout: 15m
    remediation:
      retries: 5
  values:
    defaultPodOptions:
      nodeSelector:
        node-role.kubernetes.io/worker: 'true'
    controllers:
      app:
        type: deployment
        annotations:
          reloader.stakater.com/auto: 'true'
        initContainers:
          init-db:
            image:
              repository: ghcr.io/onedr0p/postgres-init
              tag: 17.4
            env:
              - name: INIT_POSTGRES_HOST
                valueFrom:
                  secretKeyRef:
                    name: *appname
                    key: DB_HOST
              - name: INIT_POSTGRES_DBNAME
                valueFrom:
                  secretKeyRef:
                    name: *appname
                    key: DB_NAME
              - name: INIT_POSTGRES_SUPER_PASS
                valueFrom:
                  secretKeyRef:
                    name: postgres-superuser
                    key: password
              - name: INIT_POSTGRES_USER
                valueFrom:
                  secretKeyRef:
                    name: *appname
                    key: DB_NAME
              - name: INIT_POSTGRES_PASS
                valueFrom:
                  secretKeyRef:
                    name: *appname
                    key: DB_PASSWORD
        containers:
          app:
            image:
              repository: freikin/dawarich
              tag: 1.3.1
            envFrom:
              - secretRef:
                  name: *appname
            env:
              - name: TZ
                value: ${TIMEZONE}
              - name: RAILS_ENV
                value: production
              - name: RAILS_LOG_TO_STDOUT
                value: 'true'
              - name: SELF_HOSTED
                value: 'true'
              - name: STORE_GEODATA
                value: 'true'
              - name: DATABASE_HOST
                valueFrom:
                  secretKeyRef:
                    name: *appname
                    key: DB_HOST
              - name: DATABASE_PORT
                value: '5432'
              - name: DATABASE_USERNAME
                valueFrom:
                  secretKeyRef:
                    name: *appname
                    key: DB_NAME
              - name: DATABASE_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: *appname
                    key: DB_PASSWORD
              - name: DATABASE_NAME
                valueFrom:
                  secretKeyRef:
                    name: *appname
                    key: DB_NAME
              - name: REDIS_URL
                value: redis://redis.databases.svc.cluster.local:6379
            volumeMounts:
              - name: data
                mountPath: /var/app/public
                subPath: public
              - name: data
                mountPath: /var/app/storage
                subPath: storage
              - name: data
                mountPath: /var/app/tmp/imports/watched
                subPath: watched
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/health
                    port: 3000
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  successThreshold: 1
                  failureThreshold: 5
                  timeoutSeconds: 10
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/health
                    port: 3000
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  successThreshold: 1
                  failureThreshold: 10
                  timeoutSeconds: 10
    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: dawarich-volume
    service:
      app:
        ports:
          http:
            port: 3000
        primary: true
        type: ClusterIP
    ingress:
      app:
        enabled: true
        annotations:
          hajimari.io/enable: 'true'
          hajimari.io/icon: map-marker-radius
          hajimari.io/group: Home
          hajimari.io/info: Dawarich - Location History
          cert-manager.io/cluster-issuer: letsencrypt-production
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
          traefik.ingress.kubernetes.io/router.middlewares: 
            networking-chain-authelia@kubernetescrd
        hosts:
          - host: &uri dawarich.${SECRET_DEV_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  port: http
        tls:
          - hosts:
              - *uri
            secretName: *uri
