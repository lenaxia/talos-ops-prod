# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &appname dawarich
  namespace: &namespace home
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 4.3.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    createNamespace: true
    timeout: 15m
    remediation:
      retries: 5
  upgrade:
    timeout: 15m
    remediation:
      retries: 5
  values:
    defaultPodOptions:
      nodeSelector:
        node-role.kubernetes.io/worker: 'true'
    controllers:
      app:
        type: deployment
        annotations:
          reloader.stakater.com/auto: 'true'
        initContainers:
          init-db:
            image:
              repository: ghcr.io/onedr0p/postgres-init
              tag: 17.4
            env:
              - name: INIT_POSTGRES_HOST
                valueFrom:
                  secretKeyRef:
                    name: *appname
                    key: DB_HOST
              - name: INIT_POSTGRES_DBNAME
                valueFrom:
                  secretKeyRef:
                    name: *appname
                    key: DB_NAME
              - name: INIT_POSTGRES_SUPER_PASS
                valueFrom:
                  secretKeyRef:
                    name: postgres-superuser
                    key: password
              - name: INIT_POSTGRES_USER
                valueFrom:
                  secretKeyRef:
                    name: *appname
                    key: DB_NAME
              - name: INIT_POSTGRES_PASS
                valueFrom:
                  secretKeyRef:
                    name: *appname
                    key: DB_PASSWORD
        containers:
          app:
            image:
              repository: freikin/dawarich
              tag: 1.7.2
            envFrom:
              - secretRef:
                  name: *appname
            env:
              - name: TZ
                value: ${TIMEZONE}
              - name: RAILS_ENV
                value: production
              - name: RAILS_LOG_TO_STDOUT
                value: 'true'
              - name: SELF_HOSTED
                value: 'true'
              - name: STORE_GEODATA
                value: 'true'
              - name: DATABASE_HOST
                valueFrom:
                  secretKeyRef:
                    name: *appname
                    key: DB_HOST
              - name: DATABASE_PORT
                value: '5432'
              - name: DATABASE_USERNAME
                valueFrom:
                  secretKeyRef:
                    name: *appname
                    key: DB_NAME
              - name: DATABASE_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: *appname
                    key: DB_PASSWORD
              - name: DATABASE_NAME
                valueFrom:
                  secretKeyRef:
                    name: *appname
                    key: DB_NAME
              - name: OIDC_ISSUER
                value: "https://authelia.${SECRET_DEV_DOMAIN}"
              - name: OIDC_REDIRECT_URI
                value: "https://dawarich.${SECRET_DEV_DOMAIN}/users/auth/openid_connect/callback"
              - name: OIDC_PROVIDER_NAME
                value: "Authelia"
              - name: OIDC_AUTO_REGISTER
                value: 'true'
              - name: ALLOW_EMAIL_PASSWORD_REGISTRATION
                value: 'false'
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 3000
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  successThreshold: 1
                  failureThreshold: 5
                  timeoutSeconds: 10
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 3000
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  successThreshold: 1
                  failureThreshold: 10
                  timeoutSeconds: 10
            args:
              - bin/rails
              - server
              - -p
              - "3000"
              - -b
              - "::"
          sidekiq:
            image:
              repository: freikin/dawarich
              tag: 1.7.2
            envFrom:
              - secretRef:
                  name: *appname
            env:
              - name: TZ
                value: ${TIMEZONE}
              - name: RAILS_ENV
                value: production
              - name: RAILS_LOG_TO_STDOUT
                value: 'true'
              - name: SELF_HOSTED
                value: 'true'
              - name: STORE_GEODATA
                value: 'true'
              - name: DATABASE_HOST
                valueFrom:
                  secretKeyRef:
                    name: *appname
                    key: DB_HOST
              - name: DATABASE_PORT
                value: '5432'
              - name: DATABASE_USERNAME
                valueFrom:
                  secretKeyRef:
                    name: *appname
                    key: DB_NAME
              - name: DATABASE_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: *appname
                    key: DB_PASSWORD
              - name: DATABASE_NAME
                valueFrom:
                  secretKeyRef:
                    name: *appname
                    key: DB_NAME
              - name: BACKGROUND_PROCESSING_CONCURRENCY
                value: '10'
              - name: PROMETHEUS_EXPORTER_ENABLED
                value: 'false'
              - name: OIDC_ISSUER
                value: "https://authelia.${SECRET_DEV_DOMAIN}"
              - name: OIDC_REDIRECT_URI
                value: "https://dawarich.${SECRET_DEV_DOMAIN}/users/auth/openid_connect/callback"
              - name: OIDC_PROVIDER_NAME
                value: "Authelia"
              - name: OIDC_AUTO_REGISTER
                value: 'true'
              - name: ALLOW_EMAIL_PASSWORD_REGISTRATION
                value: 'false'
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 512Mi
            args:
              - sidekiq

    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 20Gi
        globalMounts:
          - path: /var/app/public
            subPath: public
          - path: /var/app/storage
            subPath: storage
          - path: /var/app/tmp/imports/watched
            subPath: watched

    service:
      app:
        ports:
          http:
            port: 3000
        primary: true
        type: ClusterIP
    ingress:
      app:
        enabled: true
        annotations:
          hajimari.io/enable: 'true'
          hajimari.io/icon: map-marker-radius
          hajimari.io/group: Home
          hajimari.io/info: Dawarich - Location History
          cert-manager.io/cluster-issuer: letsencrypt-production
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
          traefik.ingress.kubernetes.io/router.middlewares: 
            networking-chain-no-auth@kubernetescrd
        hosts:
          - host: &uri dawarich.${SECRET_DEV_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  port: http
        tls:
          - hosts:
              - *uri
            secretName: *uri
