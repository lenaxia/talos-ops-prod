# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &appname vllm-classifier
  namespace: &namespace home
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 4.3.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    createNamespace: true
    timeout: 15m
    remediation:
      retries: 10
  upgrade:
    timeout: 15m
    remediation:
      retries: 10
  values:
    defaultPodOptions:
      nodeSelector:
        node-role.kubernetes.io/worker: 'true'
      tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "special"
          effect: "NoSchedule"
    controllers:
      app:
        type: deployment
        annotations:
          reloader.stakater.com/auto: 'true'
        containers:
          app:
            image:
              repository: vllm/vllm-openai
              tag: v0.17.1@sha256:0dc46f74eb0e630675d83101dc66c6441c4475cceedcf9235ee42b87c3affd23
            command: ["/bin/sh", "-c"]
            args:
                  - |
                   vllm serve \
                       Qwen/Qwen2.5-3B-Instruct-AWQ \
                       --served-model-name classifier \
                       --max-model-len 1000 \
                       --max-num-seqs 30 \
                        --gpu-memory-utilization 0.85 \
                       --tensor-parallel-size 1 \
                       --trust-remote-code \
                       --quantization awq \
                       --host 0.0.0.0 \
                       --port 8000 \
                       --dtype auto \
                       --disable-log-requests
            env:
              - name: TZ
                value: ${TIMEZONE}
              - name: CUDA_LAUNCH_BLOCKING
                value: 0
              - name: TORCH_USE_CUDA_DSA
                value: 1
              - name: VLLM_USE_MODELSCOPE
                value: "false"
              - name: VLLM_TORCH_COMPILE
                value: "true"
              - name: NVIDIA_VISIBLE_DEVICES
                value: "GPU-6726851a-d64e-09c8-a938-1537593e3106" # RTX 3090
            envFrom:
              - secretRef:
                  name: *appname
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8000
                  initialDelaySeconds: 300
                  periodSeconds: 30
                  successThreshold: 1
                  failureThreshold: 5
                  timeoutSeconds: 10
              readiness: *probe
            resources:
              requests:
                nvidia.com/gpu: "1"
                memory: "16Gi"
              limits:
                nvidia.com/gpu: "1"
                memory: "22Gi"

    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        storageClass: openebs-hostpath
        accessMode: ReadWriteOnce
        size: 20Gi
        globalMounts:
          - path: /root/.cache/huggingface
      shm:
        type: emptyDir
        medium: Memory
        sizeLimit: 8Gi
        globalMounts:
          - path: /dev/shm
    service:
      app:
        ports:
          http:
            port: 8000
        primary: true
        type: LoadBalancer
        loadBalancerIP: ${SVC_VLLM_CLASSIFIER_IP}
