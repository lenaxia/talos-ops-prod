# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &appname vllm-classifier
  namespace: &namespace home
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    createNamespace: true
    timeout: 15m
    remediation:
      retries: 10
  upgrade:
    timeout: 15m
    remediation:
      retries: 10
  values:
    defaultPodOptions:
      nodeSelector:
        node-role.kubernetes.io/worker: 'true'
      tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "special"
          effect: "NoSchedule"
    controllers:
      app:
        type: deployment
        annotations:
          reloader.stakater.com/auto: 'true'
        containers:
          app:
            image:
              repository: vllm/vllm-openai
              tag: 
                v0.23.0@sha256:6d8429e38e3747723ca07ee1b17972e09bb9c51c4032b266f24fb1cc3b22ed8f
            command: ["/bin/sh", "-c"]
            args:
              - |
                vllm serve \
                    Qwen/Qwen2.5-3B-Instruct-AWQ \
                    --served-model-name classifier \
                    --max-model-len 1000 \
                    --max-num-seqs 30 \
                    --gpu-memory-utilization 0.9 \
                    --tensor-parallel-size 1 \
                    --trust-remote-code \
                    --quantization awq \
                    --host 0.0.0.0 \
                    --port 8000 \
                    --dtype auto
                # NOTE: --disable-log-requests was removed in vllm v0.20
                # (replaced by opt-in --enable-log-requests; default is no request logging).
            env:
              - name: TZ
                value: ${TIMEZONE}
              - name: CUDA_LAUNCH_BLOCKING
                value: 0
              - name: TORCH_USE_CUDA_DSA
                value: 1
              - name: VLLM_USE_MODELSCOPE
                value: "false"
              - name: VLLM_TORCH_COMPILE
                value: "true"
            envFrom:
              - secretRef:
                  name: *appname
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8000
                  initialDelaySeconds: 300
                  periodSeconds: 30
                  successThreshold: 1
                  failureThreshold: 5
                  timeoutSeconds: 10
              readiness: *probe
            resources:
              requests:
                nvidia.com/gpu: "1"
                memory: "16Gi"
              limits:
                nvidia.com/gpu: "1"
                memory: "22Gi"

    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        storageClass: openebs-hostpath
        accessMode: ReadWriteOnce
        size: 20Gi
        globalMounts:
          - path: /root/.cache/huggingface
      shm:
        type: emptyDir
        medium: Memory
        sizeLimit: 8Gi
        globalMounts:
          - path: /dev/shm
    service:
      app:
        ports:
          http:
            port: 8000
        primary: true
        type: LoadBalancer
        loadBalancerIP: ${SVC_VLLM_CLASSIFIER_IP}
