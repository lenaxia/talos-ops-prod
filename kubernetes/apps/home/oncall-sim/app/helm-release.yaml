# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-4.6.2/charts/other/app-template/values.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &appname oncall-sim
  namespace: &namespace home
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 4.3.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    defaultPodOptions:
      nodeSelector:
        node-role.kubernetes.io/worker: "true"

    controllers:
      main:
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          # Static React SPA — VITE_LLM_MODE=proxy, VITE_LLM_BASE_URL=/llm
          # Browser calls /llm (same origin) → Traefik routes it to the proxy sidecar
          # Credentials are never baked into the bundle
          client:
            image:
              repository: ghcr.io/lenaxia/oncall-sim/client
              tag: 1.0.48
            env:
              DEBUG: "true"
            ports:
              - containerPort: 3000
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi

          # LLM proxy sidecar — holds API credentials, forwards /llm → LLM backend
          proxy:
            image:
              repository: ghcr.io/lenaxia/oncall-sim/proxy
              tag: 1.0.48
            env:
              # Restrict CORS to pod-internal traffic only; Traefik is the public face
              CORS_ORIGINS: "https://oncall-sim.${SECRET_DEV_DOMAIN}"
            envFrom:
              - secretRef:
                  name: *appname
            ports:
              - containerPort: 8000
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi

    service:
      main:
        controller: main
        primary: true
        ports:
          http:
            port: 3000
            targetPort: 3000
          proxy:
            port: 8000
            targetPort: 8000

    ingress:
      main:
        enabled: true
        className: traefik
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-production
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
          traefik.ingress.kubernetes.io/router.middlewares: networking-chain-no-auth@kubernetescrd
          hajimari.io/enable: "true"
          hajimari.io/icon: school
          hajimari.io/group: Home
        hosts:
          - host: &uri oncall-sim.${SECRET_DEV_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: http
              - path: /llm
                pathType: Prefix
                service:
                  identifier: main
                  port: proxy
        tls:
          - hosts:
              - *uri
            secretName: *uri
