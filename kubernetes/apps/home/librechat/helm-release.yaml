# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-4.6.2/charts/other/app-template/values.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &appname librechat
  namespace: &namespace home
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  values:
    defaultPodOptions:
      nodeSelector:
        node-role.kubernetes.io/worker: "true"

    controllers:
      main:
        type: deployment
        # RWO PVC + single-replica ⇒ Recreate avoids stuck rollouts.
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          main:
            image:
              repository: ghcr.io/danny-avila/librechat
              tag: v0.8.6
            env:
              # ── Server config ────────────────────────────────────────────
              # Dockerfile already sets HOST=0.0.0.0; PORT defaults to 3080.
              TZ: ${TIMEZONE}
              NODE_ENV: production
              DOMAIN_CLIENT: https://chat2.${SECRET_DEV_DOMAIN}
              DOMAIN_SERVER: https://chat2.${SECRET_DEV_DOMAIN}
              # Disable file logging — use stdout so it lands in Loki/Vector.
              LOG_TO_FILE: "false"
              DEBUG_LOGGING: "false"
              CONSOLE_JSON: "false"
              # No public search engines.
              NO_INDEX: "true"

              # ── Optional services we are NOT running ─────────────────────
              SEARCH: "false"          # disables MeiliSearch dependency
              # RAG_API_URL intentionally unset ⇒ RAG features disabled.

              # ── Auth: OIDC-only via Authelia ─────────────────────────────
              ALLOW_EMAIL_LOGIN: "false"
              ALLOW_REGISTRATION: "false"
              ALLOW_SOCIAL_LOGIN: "true"
              ALLOW_SOCIAL_REGISTRATION: "true"
              # Skip the LibreChat login form and bounce straight to Authelia.
              OPENID_AUTO_REDIRECT: "true"
              OPENID_USE_END_SESSION_ENDPOINT: "true"
              OPENID_ISSUER: https://authelia.${SECRET_DEV_DOMAIN}
              # LibreChat has its own dedicated Authelia OIDC client.
              # client_id `librechat`. The plaintext client_secret lives in
              # cluster-secrets as SECRET_LIBRECHAT_OAUTH_CLIENT_SECRET; the
              # PBKDF2-SHA512 hash of that same value is what Authelia stores
              # under SECRET_LIBRECHAT_OAUTH_CLIENT_SECRET_HASHED.
              OPENID_CLIENT_ID: librechat
              OPENID_CLIENT_SECRET: ${SECRET_LIBRECHAT_OAUTH_CLIENT_SECRET}
              OPENID_SCOPE: "openid profile email"
              # LibreChat hardcodes this callback path; Authelia must allow it.
              OPENID_CALLBACK_URL: /oauth/openid/callback
              OPENID_BUTTON_LABEL: Sign in with The Kao Cloud
              OPENID_USERNAME_CLAIM: preferred_username
              OPENID_NAME_CLAIM: name

              # ── Endpoint allow-list ──────────────────────────────────────
              # Built-in endpoints we want LibreChat to expose. The custom
              # OpenAI-compatible provider ("The Kao Cloud") is defined via
              # librechat.yaml below and shows up under its own tile, so we
              # do NOT include `openAI` here (otherwise the URL/key would have
              # to come from env vars and the tile would be labeled "OpenAI").
              ENDPOINTS: "agents"
              # Tell LibreChat where to find the YAML config (default is
              # /app/librechat.yaml; setting explicitly for clarity).
              CONFIG_PATH: /app/librechat.yaml

              # ── Trust proxy (we sit behind Traefik) ──────────────────────
              TRUST_PROXY: "1"

            envFrom:
              # Secret carries: MONGO_URI, CREDS_KEY, CREDS_IV, JWT_SECRET,
              # JWT_REFRESH_SECRET, OPENID_SESSION_SECRET, THEKAO_AI_API_KEY
              # (THEKAO_AI_API_KEY is referenced from librechat.yaml below.)
              - secretRef:
                  name: *appname

            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi

            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 3080
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 3080
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 3080
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 30

    service:
      main:
        primary: true
        controller: main
        ports:
          http:
            port: 3080

    configMaps:
      # The ${THEKAO_AI_API_KEY} placeholder is interpolated by LibreChat at
      # runtime from process.env (NOT by Flux variable substitution), so the
      # actual key never appears in the rendered ConfigMap on disk — it
      # stays in the SOPS-encrypted Secret and is read from the pod env.
      config:
        enabled: true
        # Override the default name (which would be the release name) so
        # the ConfigMap is unambiguous and doesn't collide with the Secret
        # of the same name in the persistence reference.
        forceRename: librechat-config
        data:
          librechat.yaml: |
            version: 1.3.12
            cache: true

            # Custom interface: keep defaults; just set a friendly welcome.
            interface:
              customWelcome: 'Welcome to The Kao Cloud LibreChat.'
              modelSelect: true
              parameters: true
              presets: true
              prompts:
                use: true
                create: true
              bookmarks: true
              multiConvo: true
              agents:
                use: true
                create: true

            # OIDC is the only social login we expose.
            registration:
              socialLogins: ['openid']

            endpoints:
              # Single platform-wide OpenAI-compatible endpoint pointing at
              # the in-cluster LiteLLM router via its public ingress. The
              # API key is a LiteLLM virtual key (not the master key) so
              # spend/usage gets attributed to LibreChat separately.
              # NOTE the `$$` — Flux postBuild.substituteFrom uses ${VAR}
              # syntax too, and would otherwise replace ${THEKAO_AI_API_KEY}
              # with empty string at apply time. `$${VAR}` is escaped and
              # written to the rendered ConfigMap as the literal `${VAR}`,
              # which LibreChat's extractEnvVariable() then resolves from
              # process.env at request time.
              custom:
                - name: 'The Kao Cloud'
                  apiKey: '$${THEKAO_AI_API_KEY}'
                  baseURL: 'https://ai.thekao.cloud/v1'
                  models:
                    # Pull the live model list from /v1/models on every page
                    # load so adding a model in LiteLLM surfaces here without
                    # a redeploy. `default` is the seed list shown until the
                    # fetch completes.
                    default:
                      - 'gpt-4o-mini'
                    fetch: true
                  titleConvo: true
                  titleModel: 'current_model'
                  modelDisplayLabel: 'The Kao Cloud'

    persistence:
      # /app/uploads — RAG/file uploads
      # /app/client/public/images — user-uploaded chat images
      # We cover both with a single PVC + advancedMounts using subPaths.
      data:
        enabled: true
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 10Gi
        storageClass: longhorn
        advancedMounts:
          main:
            main:
              - path: /app/uploads
                subPath: uploads
              - path: /app/client/public/images
                subPath: images
      # Mount the librechat-config ConfigMap (rendered by app-template above)
      # at /app/librechat.yaml so LibreChat picks up our custom endpoint.
      config:
        enabled: true
        type: configMap
        name: librechat-config
        advancedMounts:
          main:
            main:
              - path: /app/librechat.yaml
                subPath: librechat.yaml
                readOnly: true

    ingress:
      main:
        enabled: true
        className: traefik
        annotations:
          hajimari.io/enable: "true"
          hajimari.io/icon: chat-processing-outline
          hajimari.io/info: LibreChat
          hajimari.io/group: *namespace
          cert-manager.io/cluster-issuer: letsencrypt-production
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
          traefik.ingress.kubernetes.io/router.middlewares:
            networking-chain-authelia@kubernetescrd
        hosts:
          - host: &uri chat2.${SECRET_DEV_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: http
        tls:
          - hosts:
              - *uri
            secretName: *uri
