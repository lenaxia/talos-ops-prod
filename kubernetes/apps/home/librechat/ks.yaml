---
# yaml-language-server: $schema=https://kubernetes-schemas.devbu.io/kustomization_v1beta2.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-home-librechat
  namespace: flux-system
  labels:
    substitution.flux.home.arpa/enabled: "true"
spec:
  dependsOn:
    # LibreChat needs its MongoDB instance to be reconciled first. The
    # mongodb-kubernetes operator + MongoDBCommunity instance live in
    # kubernetes/apps/databases/mongodb-kubernetes/.
    - name: cluster-databases-mongodb-instances
  path: ./kubernetes/apps/home/librechat
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2beta1
      kind: HelmRelease
      name: librechat
      namespace: home
  interval: 30m
  retryInterval: 1m
  timeout: 5m
