---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app nessie
  namespace: jobhunt
spec:
  interval: 15m
  chart:
    spec:
      chart: nessie
      version: 0.107.4
      sourceRef:
        kind: HelmRepository
        name: nessie
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    replicaCount: 1

    # Use in-memory version store — simplest for learning, no DB dependency.
    # Data is lost on pod restart; that's fine for Week 1 exploration.
    versionStoreType: IN_MEMORY

    # Enable the Iceberg REST Catalog endpoint
    catalog:
      enabled: true
      iceberg:
        defaultWarehouse: iceberg
        warehouses:
          - name: iceberg
            location: s3://iceberg/
            configDefaults:
              s3.path-style-access: "true"
              s3.endpoint: "http://minio.storage.svc.cluster.local:9000"
        configOverrides:
          s3.path-style-access: "true"
      storage:
        s3:
          defaultOptions:
            region: us-east-1   # MinIO ignores this but the field is required
            endpoint: "http://minio.storage.svc.cluster.local:9000"
            pathStyleAccess: true
            authType: STATIC
            accessKeySecret:
              name: *app
              awsAccessKeyId: MINIO_ACCESS_KEY
              awsSecretAccessKey: MINIO_SECRET_KEY

    service:
      type: ClusterIP
      port: 19120

    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        memory: 1Gi

    podAnnotations:
      secret.reloader.stakater.com/reload: *app
