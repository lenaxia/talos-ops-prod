---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app trino
  namespace: jobhunt
spec:
  interval: 15m
  chart:
    spec:
      chart: trino
      version: 1.42.1
      sourceRef:
        kind: HelmRepository
        name: trino
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    image:
      tag: "479"

    server:
      workers: 1

    coordinator:
      jvm:
        maxHeapSize: "2G"
      config:
        memory:
          heapHeadroomPerNode: 256MB
          maxQueryMemoryPerNode: 1GB
      resources:
        requests:
          cpu: 200m
          memory: 2.5Gi
        limits:
          memory: 3Gi
      # Mount the iceberg.properties file from the secret directly into
      # /etc/trino/catalog/ — bypasses all variable substitution issues.
      secretMounts:
        - name: trino-iceberg-catalog
          secretName: *app
          path: /etc/trino/catalog/iceberg.properties
          subPath: iceberg.properties

    worker:
      jvm:
        maxHeapSize: "2G"
      config:
        memory:
          heapHeadroomPerNode: 256MB
          maxQueryMemoryPerNode: 1GB
      resources:
        requests:
          cpu: 200m
          memory: 2.5Gi
        limits:
          memory: 3Gi
      secretMounts:
        - name: trino-iceberg-catalog
          secretName: *app
          path: /etc/trino/catalog/iceberg.properties
          subPath: iceberg.properties

    podAnnotations:
      secret.reloader.stakater.com/reload: *app
