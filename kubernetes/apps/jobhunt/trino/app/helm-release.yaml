---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app trino
  namespace: jobhunt
spec:
  interval: 15m
  chart:
    spec:
      chart: trino
      version: 1.42.1
      sourceRef:
        kind: HelmRepository
        name: trino
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    image:
      tag: "479"

    server:
      workers: 1

    coordinator:
      jvm:
        maxHeapSize: "1G"
      resources:
        requests:
          cpu: 200m
          memory: 1.5Gi
        limits:
          memory: 2Gi

    worker:
      jvm:
        maxHeapSize: "1G"
      resources:
        requests:
          cpu: 200m
          memory: 1.5Gi
        limits:
          memory: 2Gi

    # Inject MinIO credentials as env vars into every pod.
    # The catalog properties reference them via ${ENV:VAR} substitution.
    envFrom:
      - secretRef:
          name: *app

    catalogs:
      iceberg: |
        connector.name=iceberg
        iceberg.catalog.type=rest
        iceberg.rest-catalog.uri=http://nessie.jobhunt.svc.cluster.local:19120/iceberg
        iceberg.rest-catalog.warehouse=iceberg
        fs.native-s3.enabled=true
        s3.endpoint=http://minio.storage.svc.cluster.local:9000
        s3.region=us-east-1
        s3.path-style-access=true
        s3.aws-access-key=${ENV:MINIO_ACCESS_KEY}
        s3.aws-secret-key=${ENV:MINIO_SECRET_KEY}

    podAnnotations:
      secret.reloader.stakater.com/reload: *app
