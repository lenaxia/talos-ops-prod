---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mechanic
  namespace: default
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: mechanic
    namespace: default
  values:
    gitops:
      repo: lenaxia/talos-ops-prod
      manifestRoot: kubernetes
    agent:
      type: opencode
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 1000m
          memory: 2Gi
    watcher:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi
