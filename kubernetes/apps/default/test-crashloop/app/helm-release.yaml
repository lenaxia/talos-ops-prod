---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: test-crashloop
  namespace: default
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.3.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      test-crashloop:
        replicas: 1
        strategy: RollingUpdate
        
        containers:
          app:
            image:
              repository: busybox
              tag: latest
            
            command:
              - sh
              - -c
              - echo 'running successfully'; sleep 3600
            
            resources:
              requests:
                cpu: 10m
                memory: 16Mi
    
    service:
      app:
        enabled: false
    
    ingress:
      app:
        enabled: false
