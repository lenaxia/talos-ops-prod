---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: test-crashloop
    mendabot-test: "true"
  name: test-crashloop
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-crashloop
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: test-crashloop
    spec:
      containers:
      - command:
        - sh
        - -c
        - echo 'running successfully'; sleep infinity
        image: busybox:latest
        name: app
        resources:
          requests:
            cpu: 10m
            memory: 16Mi