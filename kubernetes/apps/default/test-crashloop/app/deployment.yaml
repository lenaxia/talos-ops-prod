apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-crashloop
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-crashloop
  template:
    metadata:
      labels:
        app: test-crashloop
    spec:
      containers:
        - name: crasher
          image: alpine:latest
          command:
            - sh
            - -c
            - echo "Running normally" && sleep 3600
          env:
            - name: CRASH
              value: "0"
