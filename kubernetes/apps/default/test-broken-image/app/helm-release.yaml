---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: test-broken-image
  namespace: default
  labels:
    mendabot-test: "true"
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.3.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      test-broken-image:
        replicas: 1
        strategy: RollingUpdate
        
        containers:
          app:
            image:
              repository: docker.io/ealen/echo-server
              tag: 0.9.2
            
            env:
              PORT:
                value: "8080"
            
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            
            resources:
              requests:
                cpu: 10m
                memory: 16Mi
