apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-default-test-broken-image
  namespace: flux-system
spec:
  dependsOn:
    - name: cluster-apps
  interval: 30m
  path: ./kubernetes/apps/default/test-broken-image
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
  wait: true
