apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: oncall-secrets
  namespace: default
stringData:
  # LiteLLM model string — provider-prefixed
  # Examples: openai/gpt-4o | bedrock/anthropic.claude-3-5-sonnet-20241022-v2:0
  llm-model: "REPLACE_ME"

  # API key for the LLM backend (leave empty if using IAM role / Bedrock with IRSA)
  llm-api-key: "REPLACE_ME"

  # Base URL for the LLM endpoint (leave empty to use provider default)
  llm-base-url: "REPLACE_ME"

  # Shared HMAC secret — signs tokens in server.js, validated by proxy.
  # Generate: python3 -c "import secrets; print(secrets.token_hex(32))"
  proxy-token-secret: "REPLACE_ME"
