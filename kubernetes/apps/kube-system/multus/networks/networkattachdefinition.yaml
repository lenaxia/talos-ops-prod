---
# The Talos machine config bonds every physical interface (eno1 + enp0s20f0u3)
# into eth0 (see kubernetes/bootstrap/talos/talconfig.yaml). macvlan cannot be
# created on a bond slave, so the macvlan master must be the bond itself.
#
# ROUTE SCOPE — routes[0].dst is deliberately 192.168.0.0/24 (the physical
# home-LAN subnet where Sonos / Roomba / ESPHome / NAS / AdGuard live), NOT
# the whole 192.168.0.0/20. If dst covered /20, the pod's routing table
# would send traffic to 192.168.5.x (Cilium LoadBalancer VIPs like
# Mosquitto, Authelia, LiteLLM) and 192.168.3.x (Talos node IPs) out the
# macvlan too. macvlan cannot reach its own parent host, so any VIP
# announced by the same node the pod runs on would silently fail. Keeping
# the route scope tight to 192.168.0.0/24 means only physical home-LAN
# traffic goes via macvlan; everything else routes via Cilium primary.
#
# IPAM SUBNET — subnet is 192.168.0.0/20 (matches the physical LAN broadcast
# domain). This is NOT the pool that pods get IPs from — the pool is the
# rangeStart..rangeEnd within the subnet, i.e. 192.168.6.1..192.168.6.50.
# The /20 netmask must match the physical LAN so the pod's on-link route
# (auto-generated by the kernel from the address netmask) covers the
# gateway 192.168.0.1. If the subnet were /24, pods would get e.g.
# 192.168.6.14/24, whose on-link scope is only 192.168.6.0/24 — that does
# NOT include 192.168.0.1, so the kernel would reject the explicit route
# `192.168.0.0/24 via 192.168.0.1` with "network is unreachable".
#
# TODO(ipam): host-local IPAM is per-node state. If two nodes each assign
# 192.168.6.5 there will be an L2 IP conflict. Current consumers (esphome,
# zwavejs, home-assistant) are pinned to individual workers so collisions
# are unlikely today. If additional multus consumers are added, migrate to
# whereabouts IPAM (cluster-wide state via CRDs) or split this range into
# per-node NADs.
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: multus-net
spec:
  config: '{
      "cniVersion": "0.3.0",
      "type": "macvlan",
      "capabilities": { "dns": false },
      "master": "eth0",
      "mode": "bridge",
      "ipam": {
        "type": "host-local",
        "subnet": "192.168.0.0/20",
        "rangeStart": "192.168.6.1",
        "rangeEnd": "192.168.6.50",
        "routes": [
          { "dst": "192.168.0.0/24" }
        ],
        "gateway": "192.168.0.1"
      }
    }'
