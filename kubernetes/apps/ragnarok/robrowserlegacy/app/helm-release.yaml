# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-4.6.2/charts/other/app-template/values.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &appname robrowserlegacy
  namespace: ragnarok
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 4.3.0
      interval: 16m
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    defaultPodOptions:
      nodeSelector:
        node-role.kubernetes.io/worker: 'true'

    controllers:
      main:
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          main:
            image:
              repository: ghcr.io/lenaxia/robrowserlegacy
              tag: "1.1.0"
              pullPolicy: IfNotPresent
            env:
              TZ: ${TIMEZONE}
              # Must be the public URL so the embedded asset/WS server generates correct URLs
              CLIENT_PUBLIC_URL: "https://ro.${SECRET_DEV_DOMAIN}"
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi

    service:
      main:
        primary: true
        controller: main
        ports:
          http:
            port: 3338

    ingress:
      main:
        enabled: true
        className: traefik
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-production
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
          traefik.ingress.kubernetes.io/router.middlewares: networking-chain-authelia@kubernetescrd
          hajimari.io/enable: "true"
          hajimari.io/icon: gamepad-variant
          hajimari.io/info: *appname
          hajimari.io/group: Ragnarok
        hosts:
          - host: &uri ro.${SECRET_DEV_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: http
        tls:
          - hosts:
              - *uri
            secretName: *uri

    # Config.local.js is managed as a ConfigMap and mounted into the container.
    # Edit the configMaps.config.data section below to adjust server settings.
    configMaps:
      config:
        enabled: true
        data:
          Config.local.js: |
            /* roBrowserLegacy runtime configuration — loaded by the browser */
            var Config = {
              /* Login server — rAthena renewal */
              address:          '192.168.5.103',
              port:             6900,
              /* Must match rAthena PACKETVER exactly */
              packetver:        20200401,
              renewal:          true,
              /* WebSocket proxy — served by this container */
              socketProxy:      'wss://ro.${SECRET_DEV_DOMAIN}/ws/',
              /* GRF asset server — served by this container */
              remoteClient:     'https://ro.${SECRET_DEV_DOMAIN}/',
              /* Critical for any non-localhost / NAT / containerised deployment */
              forceUseAddress:  true,
              skipIntro:        false,
              skipServerList:   false,
            };

    persistence:
      config:
        type: configMap
        identifier: config
        advancedMounts:
          main:
            main:
              - path: /robrowser/Config.local.js
                subPath: Config.local.js
                readOnly: true
