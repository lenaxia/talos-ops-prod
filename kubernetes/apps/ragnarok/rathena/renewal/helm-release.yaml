apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &appname rathena-renewal
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      interval: 16m
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    defaultPodOptions:
      nodeSelector:
        node-role.kubernetes.io/worker: 'true'

    controllers:
      main:
        enabled: true
        type: deployment
        replicas: 1
        strategy: Recreate
        containers:
          server:
            image:
              repository: ghcr.io/lenaxia/docker-rathena
              tag: 
                packetver20200401-renewal-20251220@sha256:a939f99894337b4de631f20c252d101fa88c792b514a00946159088ccd58c8ce
            envFrom:
              - secretRef:
                  name: rathena-renewal
            env:
              - name: MYSQL_HOST
                valueFrom:
                  secretKeyRef:
                    name: mariadb-operator-connection
                    key: host
              - name: MYSQL_PORT
                valueFrom:
                  secretKeyRef:
                    name: mariadb-operator-connection
                    key: port
              - name: MYSQL_USER
                valueFrom:
                  secretKeyRef:
                    name: mariadb-operator-connection
                    key: username
              - name: MYSQL_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: mariadb-operator-connection
                    key: password
              - name: MYSQL_DATABASE
                value: rathena_renewal
              - name: SET_SERVER_NAME
                value: "rAthena"
              - name: MYSQL_DROP_DB
                value: "0"
              - name: SET_PINCODE_ENABLED
                value: "no"
              - name: SET_START_POINT
                value: "prontera,155,182"
              - name: ADD_SUBNET_MAP1
                value: "255.255.255.255:10.96.255.255"
              - name: SET_CHAR_PUBLIC_IP
                value: ${SVC_RATHENA_RENEWAL_ADDR}
              - name: SET_MAP_PUBLIC_IP
                value: ${SVC_RATHENA_RENEWAL_ADDR}
              - name: SET_MAP_TO_CHAR_IP
                value: ${SVC_RATHENA_RENEWAL_ADDR}
              # Internal char->login handshake stays on loopback. Both processes
              # run in the same pod (same netns), so 127.0.0.1 is always
              # reachable and immune to interface-autodetect regressions that
              # previously grabbed a link-local 169.254.x/32 host route when
              # hostNetwork: true was in use.
              - name: SET_CHAR_TO_LOGIN_IP
                value: "127.0.0.1"
              - name: MYSQL_ACCOUNTSANDCHARS
                value: "1"
              - name: RENEWAL
                value: "true"
    service:
      main:
        enabled: true
        primary: true
        controller: main
        type: LoadBalancer
        # Pin the VIP so removing hostNetwork doesn't reshuffle it.
        loadBalancerIP: ${SVC_RATHENA_RENEWAL_ADDR}
        # Preserve client source IP for rAthena's IP-ban / login-log features.
        # Cilium L2 announcements route traffic only to nodes with a Ready
        # endpoint pod, so `Local` is safe with our single-replica deployment.
        externalTrafficPolicy: Local
        labels:
          app: rathena
        ports:
          login:
            port: 6900
            enabled: true
          char:
            port: 6121
            enabled: true
          map:
            port: 5121
            enabled: true
    persistence:
      entrypoint-sh:
        enabled: true
        type: configMap
        name: entrypoint-sh
        defaultMode: 0777
        globalMounts:
          - path: /entrypoint.sh
            subPath: entrypoint.sh
