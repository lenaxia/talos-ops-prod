---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: middlewares-secure-headers
  namespace: networking
spec:
  headers:
    # CORS fields removed (2026-07-20). Setting ANY accessControl* field
    # activates Traefik's CORS code path, which short-circuits browser
    # preflight at the edge. Without a matching accessControlAllowOriginList
    # here, every cross-origin app's preflight failed — that was the root
    # cause of the bespoke per-app CORS middlewares (e.g. llmsafespaces-api-cors).
    # Apps that need CORS now own their full config via a dedicated Middleware
    # bound on their ingress. Apps that don't need CORS are unaffected.
    hostsProxyHeaders:
      - "X-Forwarded-Host"
    stsSeconds: 63072000
    stsIncludeSubdomains: true
    stsPreload: true
    frameDeny: true
    forceSTSHeader: true
    contentTypeNosniff: true
    browserXssFilter: true
    # strict-origin-when-cross-origin is the modern default (drops the
    # origin when crossing to a less-secure destination). Pre-fix was
    # "origin-when-cross-origin" which always leaked the origin.
    referrerPolicy: "strict-origin-when-cross-origin"
    permissionsPolicy: "camera=(), geolocation=(), microphone=(), payment=(), usb=(), interest-cohort=()"
    customResponseHeaders:
      X-Robots-Tag: "none,noarchive,nosnippet,notranslate,noimageindex,"
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: middlewares-basic-auth
  namespace: networking
spec:
  basicAuth:
    secret: authsecret
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: middlewares-rate-limit
  namespace: networking
spec:
  rateLimit:
    average: 100
    burst: 200
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: middlewares-bitwarden-strip-prefix
  namespace: networking
spec:
  stripPrefix:
    prefixes:
      - "/notifications/hub"
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: middlewares-add-x-remote-user
  namespace: networking
spec:
  plugin:
    htransformation:
      Rules:
        - Name: 'X-Remote-User Create'
          Header: 'X-Remote-User'
          Value: ''  # Setting it to empty
          Type: 'Set'
        - Name: 'X-Remote-User Copy'
          Header: 'X-Remote-User'
          HeaderPrefix: '^'
          Sep: ' ' #cant use empty separators so just use space, it will remove it
          Values:
              - '^remote-user'
          Type: 'Join'
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: middlewares-add-x-remote-user-from-username
  namespace: networking
spec:
  plugin:
    htransformation:
      Rules:
        - Name: 'X-Remote-User Create'
          Header: 'X-Remote-User'
          Value: ''  # Setting it to empty
          Type: 'Set'
        - Name: 'X-Remote-User Copy'
          Header: 'X-Remote-User'
          HeaderPrefix: '^'
          Sep: ' ' #cant use empty separators so just use space, it will remove it
          Values:
              - '^username'
          Type: 'Join'
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: middlewares-authelia
  namespace: networking
spec:
  forwardAuth:
    address: http://authelia.networking.svc.cluster.local/api/authz/forward-auth
    trustForwardHeader: true
    authResponseHeaders:
      - Remote-User
      - Remote-Name
      - Remote-Email
      - Remote-Groups
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
    name: middlewares-ldapauth
    namespace: networking
spec:
    plugin:
        ldapAuth:
            Attribute: uid
            BaseDn: dc=kao,dc=family
            SearchFilter: (&({{.Attribute}}={{.Username}})(objectClass=posixAccount))
            #AllowedGroups:
            #  - ou=mathematicians,dc=example,dc=com
            Enabled: "true"
            LogLevel: DEBUG
            ServerList:
                - Port: "389"
                  Url: ldap://192.168.0.120
