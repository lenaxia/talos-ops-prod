---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: networking
spec:
  interval: 5m
  chart:
    spec:
      chart: traefik
      version: 40.3.0
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
      interval: 5m
  dependsOn:
    - name: cert-manager
      namespace: cert-manager
  install:
    createNamespace: true
    remediation:
      retries: 4
  upgrade:
    remediation:
      retries: 5
  values:
    image:
      repository: traefik
      # chart 40.3.0 only supports proxy up to v3.7.4 — see chart Chart.yaml
      # kube-version annotation. Pin matches chart's max supported version.
      tag: v3.7.5
    deployment:
      kind: Deployment
      replicas: 4

    nodeSelector:
      node-role.kubernetes.io/worker: "true"

    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: traefik

    service:
      enabled: true
      spec:
        type: LoadBalancer
        loadBalancerIP: "${SVC_TRAEFIK_ADDR}"
        externalTrafficPolicy: Cluster
      annotations:
        external-dns.home.arpa/enabled: "true"
        external-dns.alpha.kubernetes.io/hostname: "${SECRET_DEV_DOMAIN}"
      labels:
        cilium.io/l2-ip-pool: reserved
    logs:
      general:
        format: json
        # TEMPORARY DEBUG: bumped from INFO for diagnosing Conduit/Authelia/OpenWebUI
        # auth flow (issue cogwheel0/conduit#407). Revert to INFO once diagnosed.
        level: DEBUG
      access:
        enabled: true
        format: json
        # TEMPORARY DEBUG: capture auth-relevant request and response headers in
        # access logs so we can see Authelia injecting Remote-Email/Remote-Name
        # on chat.${SECRET_DEV_DOMAIN} and confirm whether OpenWebUI's auto-signin
        # via WEBUI_AUTH_TRUSTED_EMAIL_HEADER actually receives them. The default
        # for headers is "drop"; we opt specific ones in as "keep" / "redact".
        # Revert this whole `fields:` block once diagnosed.
        fields:
          defaultMode: keep
          headers:
            defaultMode: drop
            names:
              # Authelia forwardAuth response headers (injected onto request to backend)
              Remote-User: keep
              Remote-Name: keep
              Remote-Email: keep
              Remote-Groups: keep
              # Request context — useful for correlating WebView page loads
              User-Agent: keep
              Referer: keep
              Host: keep
              X-Forwarded-For: keep
              X-Forwarded-Host: keep
              X-Forwarded-Uri: keep
              X-Forwarded-Method: keep
              # Auth state — REDACT so we see presence/absence without leaking values
              # TEMPORARY: Cookie kept (not redacted) to diagnose what cookie names
              # the Dart Conduit client is actually sending. Authorization stays
              # redacted (it's a real JWT). REVERT once diagnosed.
              Authorization: redact
              Cookie: keep
              Set-Cookie: redact

    experimental:
      plugins: 
        htransformation:
          moduleName: github.com/tomMoulard/htransformation
          version: v0.3.1
        ldapAuth:
          moduleName: github.com/wiltonsr/ldapAuth
          version: v0.1.10
      
    ingressClass:
      enabled: true
      isDefaultClass: true
    ingressRoute:
      dashboard:
        enabled: false
    
    api:
      insecure: true
    
    core:
      defaultRuleSyntax: v2
    
    providers:
      kubernetesIngress:
        ingressClass: traefik
    additionalArguments:
      - "--serverstransport.insecureskipverify=true"
      - "--providers.kubernetesingress.ingressendpoint.ip=${SVC_TRAEFIK_ADDR}"
      - "--providers.kubernetesingress.allowexternalnameservices=true"
      - "--providers.kubernetescrd.allowexternalnameservices=true"
      # Disable read/write timeouts on all entrypoints so large Immich uploads
      # are never killed mid-transfer (mobile app uploads 400-600MB videos)
      - "--entrypoints.websecure.transport.respondingTimeouts.readTimeout=0"
      - "--entrypoints.websecure.transport.respondingTimeouts.writeTimeout=0"
    ports:
      traefik:
        expose:
          default: true  # Assuming this port exposure is defined similarly for other services
      web:
        http:
          redirections:
            entryPoint:
              to: websecure
              scheme: https
        expose:
          default: true
        exposedPort: 80
      websecure:
        http:
          tls:
            enabled: true
            options: "default"
        forwardedHeaders:
          trustedIPs:
            - 10.0.0.0/8
            - 192.168.0.0/16
            - 172.16.0.0/12
            - 103.21.244.0/22
            - 103.22.200.0/22
            - 103.31.4.0/22
            - 104.16.0.0/13
            - 104.24.0.0/14
            - 108.162.192.0/18
            - 131.0.72.0/22
            - 141.101.64.0/18
            - 162.158.0.0/15
            - 172.64.0.0/13
            - 173.245.48.0/20
            - 188.114.96.0/20
            - 190.93.240.0/20
            - 197.234.240.0/22
            - 198.41.128.0/17
            - 2400:cb00::/32
            - 2606:4700::/32
            - 2803:f800::/32
            - 2405:b500::/32
            - 2405:8100::/32
            - 2a06:98c0::/29
            - 2c0f:f248::/32
        expose:
          default: true  # Ensure consistent structure for 'expose'
      metrics:
        port: 8082
        expose:
          default: true  # Changed from 'expose: true' to a dictionary form
        exposedPort: 8082
    
    tlsOptions:
      default:
        minVersion: VersionTLS12
        maxVersion: VersionTLS13
        sniStrict: true
    metrics:
      prometheus:
        entryPoint: metrics
        ## Enable metrics on routers. Default=false
        addRoutersLabels: true

        serviceMonitor:
          enabled: true
          metricRelabelings: []
          #  - sourceLabels: [__name__]
          #    separator: ;
          #    regex: ^fluentd_output_status_buffer_(oldest|newest)_.+
          #    replacement: $1
          #    action: drop
          relabelings: []
          #  - sourceLabels: [__meta_kubernetes_pod_node_name]
          #    separator: ;
          #    regex: ^(.*)$
          #    targetLabel: nodename
          #    replacement: $1
          #    action: replace
          jobLabel: traefik
          interval: 30s
          honorLabels: true
          # (Optional)
          # scrapeTimeout: 5s
          honorTimestamps: true
          enableHttp2: true
          # followRedirects: true
          # additionalLabels:
          #   foo: bar
        prometheusRule:
          additionalLabels: {}
          rules:
            - alert: TraefikDown
              expr: up{job="traefik"} == 0
              for: 5m
              labels:
                context: traefik
                severity: warning
              annotations:
                summary: "Traefik Down"
                description: "{{ $labels.pod }} on {{ $labels.nodename }} is down"
  
    resources:
      requests:
        memory: 100Mi
        cpu: 500m
      limits:
        memory: 500Mi

