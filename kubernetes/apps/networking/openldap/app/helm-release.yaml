# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-4.6.2/charts/other/app-template/values.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app openldap
  namespace: networking
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 4.3.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 15m
  install:
    createNamespace: false
    timeout: 10m
    remediation:
      retries: 4
  upgrade:
    timeout: 10m
    remediation:
      retries: 4
  values:
    defaultPodOptions:
      nodeSelector:
        node-role.kubernetes.io/worker: "true"
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 1001

    controllers:
      openldap:
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"

        initContainers:
          copy-ldif:
            image:
              repository: busybox
              tag: "1.36"
            command:
              - sh
              - -c
              - cp /ldif-src/syncrepl.ldif /docker-entrypoint-initdb.d/syncrepl-modify.ldif
            securityContext:
              runAsUser: 0

        containers:
          main:
            image:
              # symas/openldap is maintained by Symas Corp (primary OpenLDAP sponsor)
              # and is bitnami-API-compatible (same env vars, same entrypoint)
              repository: symas/openldap
              tag: 2.6.8

            env:
              TZ: ${TIMEZONE}
              LDAP_ROOT: "dc=kao,dc=family"
              LDAP_ENABLE_TLS: "no"
              LDAP_CONFIG_ADMIN_ENABLED: "yes"
              SYMAS_DEBUG: "true"

            envFrom:
              - secretRef:
                  name: *app

            ports:
              - name: ldap
                containerPort: 1389
                protocol: TCP

            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false

            resources:
              requests:
                cpu: 20m
                memory: 128Mi
              limits:
                memory: 256Mi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false

    service:
      openldap:
        controller: openldap
        primary: true
        type: ClusterIP
        ports:
          ldap:
            port: 389
            targetPort: 1389
            protocol: TCP

    persistence:
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 1Gi
        storageClass: longhorn
        retain: true
        advancedMounts:
          openldap:
            main:
              - path: /openldap

      # syncrepl drop-in LDIF source — mounted read-only, copied to initdb dir by init container
      syncrepl-config:
        type: configMap
        name: openldap
        defaultMode: 0644
        advancedMounts:
          openldap:
            copy-ldif:
              - path: /ldif-src
                readOnly: true

      # writable initdb dir — init container copies LDIF here, bitnami entrypoint reads it
      initdb:
        type: emptyDir
        advancedMounts:
          openldap:
            copy-ldif:
              - path: /docker-entrypoint-initdb.d
            main:
              - path: /docker-entrypoint-initdb.d

    configMaps:
      syncrepl:
        enabled: true
        data:
          syncrepl.ldif: |
            dn: olcDatabase={2}mdb,cn=config
            changetype: modify
            add: olcSyncRepl
            olcSyncRepl: rid=001
              provider=ldap://${NAS_ADDR}:389
              bindmethod=simple
              binddn="uid=replicator,cn=users,dc=kao,dc=family"
              credentials=${LDAP_REPLICATOR_PASSWORD}
              searchbase="dc=kao,dc=family"
              scope=sub
              schemachecking=off
              type=refreshAndPersist
              retry="5 5 300 +"
              interval=00:00:05:00
              attrs="*,+"
            -
            add: olcUpdateRef
            olcUpdateRef: ldap://${NAS_ADDR}:389
