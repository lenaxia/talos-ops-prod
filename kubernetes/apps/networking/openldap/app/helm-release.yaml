# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-4.6.2/charts/other/app-template/values.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app openldap
  namespace: networking
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 4.3.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 15m
  install:
    createNamespace: false
    remediation:
      retries: 4
  upgrade:
    remediation:
      retries: 4
  values:
    defaultPodOptions:
      nodeSelector:
        node-role.kubernetes.io/worker: "true"
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0

    controllers:
      openldap:
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          main:
            image:
              repository: symas/openldap
              tag: 2.6.8

            env:
              TZ: ${TIMEZONE}
              # slapd debug level — 256 = stats, 0 = silent
              SLAPD_LOGLEVEL: "0"

            envFrom:
              - secretRef:
                  name: *app

            command:
              - /bin/sh
              - -c
              - |
                set -e
                DATA_DIR=/var/lib/ldap
                CONF_DIR=/etc/ldap/slapd.d

                # Bootstrap only on first start (no DB files yet)
                if [ ! -f "$DATA_DIR/.bootstrapped" ]; then
                  echo "==> Bootstrapping slapd as syncrepl consumer of ${NAS_ADDR}"

                  # Create minimal slapd config
                  mkdir -p "$CONF_DIR" "$DATA_DIR"

                  # Write slapd bootstrap LDIF
                  cat > /tmp/slapd-bootstrap.ldif <<EOF
                dn: cn=config
                objectClass: olcGlobal
                cn: config
                olcLogLevel: 0

                dn: cn=schema,cn=config
                objectClass: olcSchemaConfig
                cn: schema

                include: file:///etc/ldap/schema/core.ldif
                include: file:///etc/ldap/schema/cosine.ldif
                include: file:///etc/ldap/schema/inetorgperson.ldif
                include: file:///etc/ldap/schema/nis.ldif

                dn: olcDatabase=config,cn=config
                objectClass: olcDatabaseConfig
                olcDatabase: config
                olcAccess: to * by dn.exact=gidNumber=0+uidNumber=0,cn=peercred,cn=external,cn=auth manage by * break

                dn: olcDatabase=mdb,cn=config
                objectClass: olcDatabaseConfig
                objectClass: olcMdbConfig
                olcDatabase: mdb
                olcSuffix: dc=kao,dc=family
                olcDbDirectory: /var/lib/ldap
                olcDbIndex: objectClass eq
                olcDbIndex: uid eq,pres,sub
                olcDbIndex: cn eq,pres,sub
                olcDbIndex: memberOf eq
                olcAccess: to * by * read
                olcSyncRepl: rid=001
                  provider=ldap://${NAS_ADDR}:389
                  bindmethod=simple
                  binddn="uid=replicator,cn=users,dc=kao,dc=family"
                  credentials=$LDAP_REPLICATOR_PASSWORD
                  searchbase="dc=kao,dc=family"
                  scope=sub
                  schemachecking=off
                  type=refreshAndPersist
                  retry="5 5 300 +"
                  interval=00:00:05:00
                  attrs="*,+"
                olcUpdateRef: ldap://${NAS_ADDR}:389
                EOF

                  slapadd -n 0 -F "$CONF_DIR" -l /tmp/slapd-bootstrap.ldif
                  touch "$DATA_DIR/.bootstrapped"
                  echo "==> Bootstrap complete"
                fi

                echo "==> Starting slapd"
                exec slapd -F "$CONF_DIR" -h "ldap://0.0.0.0:389/" -d ${SLAPD_LOGLEVEL}

            ports:
              - name: ldap
                containerPort: 389
                protocol: TCP

            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - ldapsearch
                      - -x
                      - -H
                      - ldap://localhost:389
                      - -b
                      - dc=kao,dc=family
                      - -s
                      - base
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - ldapsearch
                      - -x
                      - -H
                      - ldap://localhost:389
                      - -b
                      - dc=kao,dc=family
                      - -s
                      - base
                  initialDelaySeconds: 20
                  periodSeconds: 15
                  timeoutSeconds: 10
                  failureThreshold: 3

            resources:
              requests:
                cpu: 20m
                memory: 128Mi
              limits:
                memory: 256Mi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false

    service:
      openldap:
        controller: openldap
        primary: true
        type: ClusterIP
        ports:
          ldap:
            port: 389
            targetPort: 389
            protocol: TCP

    persistence:
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 1Gi
        storageClass: longhorn
        retain: true
        advancedMounts:
          openldap:
            main:
              - path: /var/lib/ldap

      config:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 128Mi
        storageClass: longhorn
        retain: true
        advancedMounts:
          openldap:
            main:
              - path: /etc/ldap/slapd.d
