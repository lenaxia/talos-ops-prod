# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-4.6.2/charts/other/app-template/values.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app openldap
  namespace: networking
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 4.3.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 15m
  install:
    createNamespace: false
    timeout: 10m
    remediation:
      retries: 4
  upgrade:
    timeout: 10m
    remediation:
      retries: 4
  values:
    defaultPodOptions:
      nodeSelector:
        node-role.kubernetes.io/worker: "true"
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 1001

    controllers:
      openldap:
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          main:
            image:
              # symas/openldap is maintained by Symas Corp (primary OpenLDAP sponsor)
              # and is bitnami-API-compatible (same env vars, same entrypoint)
              repository: symas/openldap
              tag: 2.6.8

            env:
              TZ: ${TIMEZONE}
              LDAP_ROOT: "dc=kao,dc=family"
              LDAP_ENABLE_TLS: "no"
              LDAP_CONFIG_ADMIN_ENABLED: "yes"
              LDAP_VOLUME_DIR: "/bitnami/openldap"
              LDAP_DATA_DIR: "/bitnami/openldap/data"
              LDAP_ONLINE_CONF_DIR: "/bitnami/openldap/slapd.d"

            envFrom:
              - secretRef:
                  name: *app

            ports:
              - name: ldap
                containerPort: 1389
                protocol: TCP

            lifecycle:
              postStart:
                exec:
                  # Wait for slapd to be ready then configure syncrepl via ldapmodify.
                  # Always exits 0 — failure here is non-fatal (syncrepl can be added manually).
                  command:
                    - /bin/bash
                    - -c
                    - |
                      set +e
                      for i in $(seq 1 60); do
                        /opt/bitnami/openldap/bin/ldapsearch -x -H ldap://localhost:1389 -b dc=kao,dc=family -s base >/dev/null 2>&1 && break
                        sleep 3
                      done
                      printf '%s\n' \
                        'dn: olcDatabase={2}mdb,cn=config' \
                        'changetype: modify' \
                        'add: olcSyncRepl' \
                        "olcSyncRepl: rid=001 provider=ldap://${NAS_ADDR}:389 bindmethod=simple binddn=\"uid=replicator,cn=users,dc=kao,dc=family\" credentials=$LDAP_REPLICATOR_PASSWORD searchbase=\"dc=kao,dc=family\" scope=sub schemachecking=off type=refreshAndPersist retry=\"5 5 300 +\" interval=00:00:05:00 attrs=\"*,+\"" \
                        '-' \
                        'add: olcUpdateRef' \
                        "olcUpdateRef: ldap://${NAS_ADDR}:389" \
                        > /tmp/syncrepl.ldif
                      /opt/bitnami/openldap/bin/ldapmodify \
                        -H ldap://localhost:1389 \
                        -D "cn=admin,cn=config" \
                        -w "$LDAP_CONFIG_ADMIN_PASSWORD" \
                        -f /tmp/syncrepl.ldif
                      exit 0

            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /opt/bitnami/openldap/bin/ldapsearch
                      - -x
                      - -H
                      - ldap://localhost:1389
                      - -b
                      - dc=kao,dc=family
                      - -s
                      - base
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /opt/bitnami/openldap/bin/ldapsearch
                      - -x
                      - -H
                      - ldap://localhost:1389
                      - -b
                      - dc=kao,dc=family
                      - -s
                      - base
                  initialDelaySeconds: 30
                  periodSeconds: 15
                  timeoutSeconds: 10
                  failureThreshold: 5

            resources:
              requests:
                cpu: 20m
                memory: 128Mi
              limits:
                memory: 256Mi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false

    service:
      openldap:
        controller: openldap
        primary: true
        type: ClusterIP
        ports:
          ldap:
            port: 389
            targetPort: 1389
            protocol: TCP

    persistence:
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 1Gi
        storageClass: longhorn
        retain: true
        advancedMounts:
          openldap:
            main:
              - path: /bitnami/openldap
