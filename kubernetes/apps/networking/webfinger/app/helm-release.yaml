apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &appname webfinger
  namespace: networking
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 4.3.0
      interval: 16m
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    defaultPodOptions:
      nodeSelector:
        node-role.kubernetes.io/worker: 'true'
    podAnnotations:
      secret.reloader.stakater.com/reload: *appname
    controllers:
      main:
        strategy: Recreate
        containers:
          main:
            image:
              repository: httpd
              tag: 2.4.66
            env:
              TZ: ${TIMEZONE}
            probes:
              liveness:
                enabled: true
                type: HTTP
                path: /
                port: 80
                initialDelaySeconds: 30
                periodSeconds: 10
                timeoutSeconds: 5
                failureThreshold: 3
              readiness:
                enabled: true
                type: HTTP
                path: /
                port: 80
                initialDelaySeconds: 5
                periodSeconds: 5
                timeoutSeconds: 3
                failureThreshold: 3
              startup:
                enabled: true
                type: HTTP
                path: /
                port: 80
                initialDelaySeconds: 5
                periodSeconds: 5
                timeoutSeconds: 3
                failureThreshold: 30
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                cpu: 100m
                memory: 128Mi
    service:
      main:
        ports:
          http:
            port: 80
        primary: true
    ingress:
      main:
        enabled: true
        annotations:
          hajimari.io/enable: 'true'
          hajimari.io/icon: baby-bottle-outline
          hajimari.io/info: *appname
          hajimari.io/group: Home
          cert-manager.io/cluster-issuer: letsencrypt-production
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
          traefik.ingress.kubernetes.io/router.middlewares: 
            networking-chain-authelia@kubernetescrd
        hosts:
          - host: &uri ${SECRET_DEV_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  port: http
        tls:
          - hosts:
              - *uri
            secretName: *uri
    persistence:
      configmap:
        enabled: true
        type: configMap
        name: webfinger
        globalMounts:
          - path: /usr/local/apache2/htdocs/.well-known/webfinger
            subPath: webfinger.json
