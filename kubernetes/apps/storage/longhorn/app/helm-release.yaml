apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  releaseName: longhorn
  chart:
    spec:
      chart: longhorn
      version: 1.12.0
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
  interval: 6m
  # Longhorn upgrades involve data migrations and slow CSI component rollouts.
  # Use a 15-minute timeout to accommodate:
  #   - Engine image upgrades across all nodes
  #   - CSI DaemonSet foreground deletion + recreation
  # Without this, Flux times out at 5m and triggers rollbacks.
  timeout: 15m
  install:
    remediation:
      retries: 3
  upgrade:
    # disableHooks: bypass the pre-upgrade Job hook.
    # Longhorn's longhorn-pre-upgrade Job has hook-delete-policy: hook-succeeded
    # which deletes the Job immediately on success. Helm 4's hook wait loop then
    # sees Job status: NotFound and treats it as a failure — even though the Job
    # succeeded. This is a Helm 4 regression (https://github.com/helm/helm/issues/XXXX).
    # The pre-upgrade job only validates the upgrade path is supported; we accept
    # the (very small) risk of skipping it given Renovate controls the version bump.
    disableHooks: true
    remediation:
      retries: 3
      remediateLastFailure: true
  #valuesFrom:
  #  - kind: Secret
  #    targetPath: defaultSettings.backupTarget
  #    name: longhorn-minio-secret
  #    valuesKey: AWS_ENDPOINTS
  #    optional: false
  values:
    service:
      ui:
        #type: LoadBalancer
        nodePort: null

    persistence:
      defaultClass: true
      defaultFsType: ext4
      defaultMkfsParams: ""
      defaultClassReplicaCount: 3
      defaultDataLocality: "best-effort"
    defaultSettings:
    #  backupTargetCredentialSecret: longhorn-minio-secret
      autoDeletePodWhenVolumeDetachedUnexpectedly: true
      orphanAutoDeletion: true
      nodeDownPodDeletionPolicy: "delete-both-statefulset-and-deployment-pod"
      dataLocality: "best-effort"
      replicaAutoBalance: "best-effort"
      defaultDataPath: "/var/mnt/longhorn"
      concurrentAutomaticEngineUpgradePerNodeLimit: 1
      defaultEngineImage: docker.io/longhornio/longhorn-engine:v1.12.0
      systemManagedComponentsNodeSelector: "node-role.kubernetes.io/worker: true"

    # Global node selector and tolerations for all Longhorn components
    global:
      # Node selector to run Longhorn only on worker nodes
      nodeSelector:
        node-role.kubernetes.io/worker: "true"

      # Tolerations for the control-plane taint
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
