---
# yaml-language-server: $schema=https://kubernetes-schemas.devbu.io/kustomization_v1beta2.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gokore-ci
  namespace: flux-system
spec:
  # The RoleBinding in rbac.yaml references the gokore-runner-gha-rs-kube-mode
  # ServiceAccount, which ARC auto-creates via the actions-runner-controller-runners
  # Kustomization. Reconcile after it so the SA exists first. (K8s tolerates a
  # RoleBinding referencing a not-yet-existing SA, but explicit ordering avoids
  # a brief inert-binding window on first reconcile.)
  dependsOn:
    - name: actions-runner-controller-runners
  path: ./kubernetes/apps/gokore-ci
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
  targetNamespace: gokore-ci
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 2m
