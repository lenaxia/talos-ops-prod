---
# ServiceAccount used by the gokore-runner ARC pod to deploy ephemeral
# rathena-test-server instances into the gokore-ci namespace during CI runs.
#
# The runner pod lives in actions-runner-system (see the gokore HelmRelease
# template.spec.serviceAccountName). This SA is bound via RoleBinding in
# gokore-ci/rbac.yaml to a Role granting exactly the permissions helm needs
# to install/upgrade/uninstall releases in that namespace — nothing more.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gokore-ci-runner
  namespace: actions-runner-system
  labels:
    app.kubernetes.io/name: gokore-runner
    app.kubernetes.io/component: ci-rbac
