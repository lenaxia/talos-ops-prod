---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app gokore-runner
  namespace: actions-runner-system
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: gha-runner-scale-set
    namespace: actions-runner-system
  values:
    githubConfigUrl: https://github.com/lenaxia/goKore
    githubConfigSecret: *app
    minRunners: 0
    maxRunners: 30
    containerMode:
      type: kubernetes
      kubernetesModeWorkVolumeClaim:
        accessModes: ["ReadWriteOnce"]
        storageClassName: openebs-hostpath
        resources:
          requests:
            storage: 25Gi
    controllerServiceAccount:
      name: actions-runner-controller
      namespace: actions-runner-system
    template:
      spec:
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: node-role.kubernetes.io/worker
                      operator: In
                      values:
                        - "true"
        containers:
          - name: runner
            image: ghcr.io/home-operations/actions-runner:2.335.1@sha256:0c6f38e8194f6c3714aa86c6dc8a72574484818ed625dd66074920b25c118508
            command:
              - /home/runner/run.sh
            env:
              - name: ACTIONS_RUNNER_REQUIRE_JOB_CONTAINER
                value: "false"
              # Force clean checkout on every job — prevents stale cached files
              # from persisting on the ReadWriteOnce work volume between runs.
              - name: ACTIONS_RUNNER_CLEAN_WORKSPACE
                value: "true"
