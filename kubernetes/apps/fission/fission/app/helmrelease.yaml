---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: fission
  namespace: fission
spec:
  interval: 30m
  chart:
    spec:
      chart: fission-all
      version: 1.22.1
      sourceRef:
        kind: HelmRepository
        name: fission-charts
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    ## Disable phone-home analytics
    analytics: false

    ## Router is the HTTP gateway for function invocations; expose as LoadBalancer
    routerServiceType: LoadBalancer

    ## All other services stay internal
    serviceType: ClusterIP

    ## Storage service for function packages — archive pruner runs every hour
    storagesvc:
      archivePruner:
        enabled: true
        interval: 60
      ## Schedule only on worker nodes where Longhorn managers run
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: node-role.kubernetes.io/worker
                operator: Exists

    ## PVC for function package storage — use longhorn (cluster default)
    persistence:
      enabled: true
      storageClass: longhorn
      size: 8Gi

    ## Default namespace where Fission CRs (Function, Environment, etc.) are created
    defaultNamespace: fission

    ## Do not auto-create namespaces — we manage them via GitOps
    createNamespace: false
