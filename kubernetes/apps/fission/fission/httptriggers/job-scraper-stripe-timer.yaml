---
# Stagger the four hourly scrapes across the hour so they don't all
# hammer their respective ATS endpoints at the same moment.
apiVersion: fission.io/v1
kind: TimeTrigger
metadata:
  name: job-scraper-stripe-hourly
  namespace: fission
spec:
  cron: "0 * * * *"
  functionref:
    name: job-scraper-stripe
    type: name
