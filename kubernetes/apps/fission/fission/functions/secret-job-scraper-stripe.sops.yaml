---
# job-scraper-stripe — Secret consumed by the Fission Function.
#
# Mounted at /secrets/fission/job-scraper-stripe/<KEY> inside the runtime pod.
#
# Pushover values use Flux postBuild substitution from cluster-secrets so
# rotating the Pushover token only requires editing
# kubernetes/flux/vars/secret.sops.yaml. Keep these as placeholder variables
# in the plaintext that gets encrypted — they are not secrets themselves.
#
# Workflow to set this file up the first time:
#
#   1. Replace PG_PASSWORD_PLACEHOLDER with the actual password from your
#      one-time `CREATE ROLE job_scraper LOGIN PASSWORD '...'` step.
#   2. Adjust JOB_TITLE_INCLUDE / JOB_LOCATION_INCLUDE to whatever filter
#      you want for Stripe roles. Empty values = notify on every role.
#   3. Encrypt in place:
#        sops --encrypt --in-place \
#          kubernetes/apps/fission/fission/functions/secret-job-scraper-stripe.sops.yaml
#   4. Verify:
#        grep -c "ENC\[" kubernetes/apps/fission/fission/functions/secret-job-scraper-stripe.sops.yaml
#        grep "^sops:" kubernetes/apps/fission/fission/functions/secret-job-scraper-stripe.sops.yaml
#
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: job-scraper-stripe
  namespace: fission
stringData:
  PG_PASSWORD: PG_PASSWORD_PLACEHOLDER
  PUSHOVER_TOKEN: ${SECRET_PUSHOVER_PROD_TOKEN}
  PUSHOVER_USER_KEY: ${SECRET_PUSHOVER_USER_KEY}
  # Comma-separated, case-insensitive substring matches. Leave empty to
  # notify on every new role.
  JOB_TITLE_INCLUDE: ""
  JOB_LOCATION_INCLUDE: ""
  # Optional overrides — defaults are usually fine.
  # PG_HOST: defaultpg-rw.databases.svc.cluster.local
  # PG_DBNAME: job_scraper
  # PG_USER: job_scraper
  # DRY_RUN: "false"
