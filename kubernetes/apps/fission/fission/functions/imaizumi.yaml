---
apiVersion: fission.io/v1
kind: Package
metadata:
  name: imaizumi
  namespace: fission
spec:
  environment:
    name: python3-manga-updater
    namespace: fission
  deployment:
    type: url
    url: https://github.com/lenaxia/functions/releases/latest/download/imaizumi-1.0.0.zip
---
apiVersion: fission.io/v1
kind: Function
metadata:
  name: imaizumi
  namespace: fission
spec:
  environment:
    name: python3-manga-updater
    namespace: fission
  package:
    packageref:
      name: imaizumi
      namespace: fission
    functionName: main
  secrets:
    - name: imaizumi
      namespace: fission
  InvokeStrategy:
    StrategyType: execution
    ExecutionStrategy:
      ExecutorType: newdeploy
      MinScale: 1
      MaxScale: 1
      SpecializationTimeout: 120
