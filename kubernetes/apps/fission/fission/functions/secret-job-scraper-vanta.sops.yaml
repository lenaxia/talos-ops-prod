---
# job-scraper-vanta — see secret-job-scraper-stripe.sops.yaml for the
# encryption + setup workflow. Must be encrypted before commit.
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: job-scraper-vanta
  namespace: fission
stringData:
  PG_PASSWORD: PG_PASSWORD_PLACEHOLDER
  PUSHOVER_TOKEN: ${SECRET_PUSHOVER_PROD_TOKEN}
  PUSHOVER_USER_KEY: ${SECRET_PUSHOVER_USER_KEY}
  JOB_TITLE_INCLUDE: ""
  JOB_LOCATION_INCLUDE: ""
