---
# job-scraper-stripe — scrapes stripe.com/jobs (Greenhouse public API)
# every hour and notifies via Pushover when new roles open.
#
# Source: https://github.com/lenaxia/functions/tree/main/functions/job-scraper-stripe
apiVersion: fission.io/v1
kind: Package
metadata:
  name: job-scraper-stripe
  namespace: fission
spec:
  environment:
    name: python3-manga-updater
    namespace: fission
  deployment:
    type: url
    url: https://github.com/lenaxia/functions/releases/latest/download/job-scraper-stripe-1.0.0.zip
---
apiVersion: fission.io/v1
kind: Function
metadata:
  name: job-scraper-stripe
  namespace: fission
spec:
  environment:
    name: python3-manga-updater
    namespace: fission
  package:
    packageref:
      name: job-scraper-stripe
      namespace: fission
    functionName: main
  secrets:
    - name: job-scraper-stripe
      namespace: fission
  InvokeStrategy:
    StrategyType: execution
    ExecutionStrategy:
      ExecutorType: newdeploy
      MinScale: 0
      MaxScale: 1
      SpecializationTimeout: 120
