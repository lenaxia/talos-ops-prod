---
# Shared Fission Package for the generic violetscans-series scraper.
#
# A single Package (and therefore a single uploaded zip artifact) backs every
# violetscans-series Function. To add another series:
#
#   1. Build & release violetscans-<version>.zip from ~/personal/functions/
#      and point this Package URL at it (Renovate or manual bump).
#   2. Create kubernetes/apps/fission/fission/functions/violetscans/series/<name>/
#      with a function.yaml, secret.sops.yaml, and kustomization.yaml — see the
#      may-i-please/ directory for the template.
#   3. Create the matching directory under
#      kubernetes/apps/fission/fission/httptriggers/violetscans/series/<name>/
#      with http.yaml, timer.yaml, and kustomization.yaml.
#   4. Add the new series path to series/kustomization.yaml in both locations.
apiVersion: fission.io/v1
kind: Package
metadata:
  name: violetscans
  namespace: fission
spec:
  environment:
    name: python3-manga-updater
    namespace: fission
  deployment:
    type: url
    url: https://github.com/lenaxia/functions/releases/latest/download/violetscans-1.0.0.zip
