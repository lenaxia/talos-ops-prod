---
# job-scraper-snowflake — drives headless Chromium against careers.snowflake.com
# (PerimeterX-protected Phenom site) every hour and notifies via Pushover when
# new roles open. Requires the python3-playwright environment.
apiVersion: fission.io/v1
kind: Package
metadata:
  name: job-scraper-snowflake
  namespace: fission
spec:
  environment:
    name: python3-playwright
    namespace: fission
  deployment:
    type: url
    url: https://github.com/lenaxia/functions/releases/latest/download/job-scraper-snowflake-1.0.0.zip
---
apiVersion: fission.io/v1
kind: Function
metadata:
  name: job-scraper-snowflake
  namespace: fission
spec:
  environment:
    name: python3-playwright
    namespace: fission
  package:
    packageref:
      name: job-scraper-snowflake
      namespace: fission
    functionName: main
  secrets:
    - name: job-scraper-snowflake
      namespace: fission
  resources:
    requests:
      cpu: 200m
      memory: 768Mi
    limits:
      memory: 2Gi
  # Snowflake's site is heavy and PerimeterX adds delay. Allow more time
  # before the function pod is killed mid-scrape.
  functionTimeout: 300
  InvokeStrategy:
    StrategyType: execution
    ExecutionStrategy:
      # Keep one pod warm to avoid Chromium cold-start tax every hour.
      ExecutorType: newdeploy
      MinScale: 1
      MaxScale: 1
      SpecializationTimeout: 240
