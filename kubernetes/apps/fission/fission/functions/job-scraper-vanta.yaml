---
# job-scraper-vanta — scrapes vanta.com/careers (Ashby posting API)
# every hour and notifies via Pushover when new roles open.
apiVersion: fission.io/v1
kind: Package
metadata:
  name: job-scraper-vanta
  namespace: fission
spec:
  environment:
    name: python3-manga-updater
    namespace: fission
  deployment:
    type: url
    url: https://github.com/lenaxia/functions/releases/latest/download/job-scraper-vanta-1.0.0.zip
---
apiVersion: fission.io/v1
kind: Function
metadata:
  name: job-scraper-vanta
  namespace: fission
spec:
  environment:
    name: python3-manga-updater
    namespace: fission
  package:
    packageref:
      name: job-scraper-vanta
      namespace: fission
    functionName: main
  secrets:
    - name: job-scraper-vanta
      namespace: fission
  InvokeStrategy:
    StrategyType: execution
    ExecutionStrategy:
      ExecutorType: newdeploy
      MinScale: 0
      MaxScale: 1
      SpecializationTimeout: 120
