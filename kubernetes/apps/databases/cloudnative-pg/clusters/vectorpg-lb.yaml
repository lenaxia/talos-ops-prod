apiVersion: v1
kind: Service
metadata:
  name: vectorpg-lb
  namespace: databases
  annotations:
    lbipam.cilium.io/ips: 192.168.5.150
spec:
  type: LoadBalancer
  selector:
    cnpg.io/cluster: vectorpg
    role: primary
  ports:
    - name: postgresql
      port: 5432
      targetPort: 5432
      protocol: TCP
