apiVersion: v1
kind: Service
metadata:
  name: synofotopg-lb
  namespace: databases
  annotations:
    lbipam.cilium.io/ips: 192.168.5.149
spec:
  type: LoadBalancer
  selector:
    cnpg.io/cluster: synofotopg
    role: primary
  ports:
    - name: postgresql
      port: 5432
      targetPort: 5432
      protocol: TCP
