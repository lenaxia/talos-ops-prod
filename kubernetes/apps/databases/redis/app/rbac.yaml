---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: redis
  namespace: databases
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/instance: redis
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: redis-pod-labeler
  namespace: databases
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/instance: redis
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: redis-pod-labeler
  namespace: databases
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/instance: redis
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: redis-pod-labeler
subjects:
  - kind: ServiceAccount
    name: redis
    namespace: databases
