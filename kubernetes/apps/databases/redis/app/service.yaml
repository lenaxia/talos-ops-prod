---
apiVersion: v1
kind: Service
metadata:
  name: redis-headless
  namespace: databases
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/instance: redis
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: redis
    app.kubernetes.io/instance: redis
  ports:
    - name: valkey
      port: 6379
      targetPort: 6379
    # sentinel port (26379) removed as of 2026-07-06 when we scaled to single-replica.
    # See helm-release.yaml and the closed PR #1962 for context.
---
apiVersion: v1
kind: Service
metadata:
  name: redis-primary
  namespace: databases
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/instance: redis
spec:
  type: ExternalName
  externalName: redis-0.redis-headless.databases.svc.cluster.local
