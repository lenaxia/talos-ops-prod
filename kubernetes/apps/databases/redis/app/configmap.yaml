---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-scripts
  namespace: databases
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/instance: redis
data:
  # Single-replica entrypoint. Historical multi-replica + sentinel-entrypoint.sh
  # variants live in git history (see PR closing the fix/redis-sentinel-discovery
  # branch on 2026-07-06 for context). The ordinal-0-as-primary check is left in
  # so this script would still function correctly if replicas is ever scaled >1
  # temporarily (though a scale-up back to real HA should restore Sentinel too).
  valkey-entrypoint.sh: |
    #!/bin/sh
    set -e

    ORDINAL="$${POD_NAME##*-}"
    HEADLESS="redis-headless.databases.svc.cluster.local"

    if [ "$ORDINAL" = "0" ]; then
      echo "Pod ordinal 0 - starting as primary"
      exec redis-server \
        --requirepass "$REDIS_PASSWORD" \
        --masterauth "$REDIS_PASSWORD" \
        --appendonly yes \
        --save 60 1
    fi

    echo "Pod ordinal $ORDINAL - waiting for redis-0..."
    until redis-cli -h "redis-0.$HEADLESS" -p 6379 -a "$REDIS_PASSWORD" --no-auth-warning ping 2>/dev/null; do
      echo "  redis-0 not ready yet..."
      sleep 3
    done

    echo "redis-0 is up - starting as replica"
    exec redis-server \
      --requirepass "$REDIS_PASSWORD" \
      --masterauth "$REDIS_PASSWORD" \
      --appendonly yes \
      --save 60 1 \
      --replicaof "redis-0.$HEADLESS" 6379
