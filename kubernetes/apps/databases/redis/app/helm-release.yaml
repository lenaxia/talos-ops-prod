---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-4.6.2/charts/other/app-template/values.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis
  namespace: databases
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 15m
  install:
    remediation:
      retries: 4
  upgrade:
    remediation:
      retries: 4
  values:
    defaultPodOptions:
      nodeSelector:
        node-role.kubernetes.io/worker: "true"
      # No podAntiAffinity needed at replicas=1. (Preserved as commented reference
      # for a future scale-up back to HA — see the git history of this file for
      # the previous 3-replica + Sentinel manifest, and the fix/redis-sentinel-
      # discovery branch closed on 2026-07-06 for the client-side migration work.)
    controllers:
      main:
        type: statefulset
        # Single-replica by deliberate design as of 2026-07-06. See PR #1962
        # (closed unmerged) and its commit history for context: repeated Sentinel
        # failovers were causing more outages than they prevented in this cluster,
        # because clients hardcoded to the `redis-primary` ExternalName never
        # followed Sentinel-elected master changes. With one replica: no elections,
        # no drift, no cascade failures. Trade-off: any pod restart = ~30-90s of
        # Redis unavailability affecting Authelia/Outline/Immich/LiteLLM.
        replicas: 1
        containers:
          valkey:
            image:
              repository: valkey/valkey
              tag: "9.1.0"
            command:
              - /scripts/valkey-entrypoint.sh
            ports:
              - name: valkey
                containerPort: 6379
            env:
              POD_NAME:
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.name
              REDIS_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: redis-secret
                    key: password
              REDISCLI_AUTH:
                valueFrom:
                  secretKeyRef:
                    name: redis-secret
                    key: password
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - sh
                      - -c
                      - redis-cli -h 127.0.0.1 -p 6379 ping
                  failureThreshold: 30
                  periodSeconds: 5
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - sh
                      - -c
                      - redis-cli -h 127.0.0.1 -p 6379 ping
                  periodSeconds: 10
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - sh
                      - -c
                      - redis-cli -h 127.0.0.1 -p 6379 ping
                  periodSeconds: 5
                  failureThreshold: 5
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 512Mi
          # Sentinel container removed as of 2026-07-06.
          # Reason: Sentinel is a failover-coordination service. With replicas=1
          # there is nothing to fail over to. Keeping a lone Sentinel container
          # would waste ~10m CPU + 64Mi RAM and serve no purpose.
          # To reintroduce HA later, restore the previous helm-release.yaml,
          # configmap.yaml sentinel-entrypoint.sh, and redis-headless service
          # port from git history.
        statefulset:
          serviceName: redis-headless
          volumeClaimTemplates:
            - name: data
              accessMode: ReadWriteOnce
              size: 2Gi
              storageClass: longhorn
              advancedMounts:
                main:
                  - path: /data
    persistence:
      scripts:
        type: configMap
        name: redis-scripts
        defaultMode: 0755
        globalMounts:
          - path: /scripts
