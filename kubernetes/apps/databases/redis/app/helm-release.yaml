---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-4.6.2/charts/other/app-template/values.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis
  namespace: databases
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 15m
  install:
    remediation:
      retries: 4
  upgrade:
    remediation:
      retries: 4
  values:
    defaultPodOptions:
      nodeSelector:
        node-role.kubernetes.io/worker: "true"
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: redis
              topologyKey: kubernetes.io/hostname
    controllers:
      main:
        type: statefulset
        replicas: 3
        containers:
          valkey:
            image:
              repository: valkey/valkey
              tag: "9.1.0"
            command:
              - /scripts/valkey-entrypoint.sh
            ports:
              - name: valkey
                containerPort: 6379
            env:
              REDIS_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: redis-secret
                    key: password
              REDISCLI_AUTH:
                valueFrom:
                  secretKeyRef:
                    name: redis-secret
                    key: password
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - sh
                      - -c
                      - redis-cli -h 127.0.0.1 -p 6379 ping
                  failureThreshold: 30
                  periodSeconds: 5
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - sh
                      - -c
                      - redis-cli -h 127.0.0.1 -p 6379 ping
                  periodSeconds: 10
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - sh
                      - -c
                      - redis-cli -h 127.0.0.1 -p 6379 ping
                  periodSeconds: 5
                  failureThreshold: 5
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 512Mi
        statefulset:
          serviceName: redis-headless
          volumeClaimTemplates:
            - name: data
              accessMode: ReadWriteOnce
              size: 2Gi
              storageClass: longhorn
              advancedMounts:
                main:
                  - path: /data
    persistence:
      scripts:
        type: configMap
        name: redis-scripts
        defaultMode: 0755
        globalMounts:
          - path: /scripts
