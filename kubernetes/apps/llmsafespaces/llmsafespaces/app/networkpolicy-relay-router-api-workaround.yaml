---
# WORKAROUND for an upstream chart bug.
#
# charts/llmsafespaces/templates/relay-router-networkpolicy.yaml grants
# ingress to the relay-router (port 8080) ONLY from workspace pods and the
# controller — but NOT from the API. The API's RelayAdminHandler must
# scrape http://relay-router:8080/metrics on every GET /admin/relay/status
# to populate per-relay requestsToday/requests429Today/activeStreams. With
# the policy as shipped, that scrape times out after ~5s (Go HTTP client
# default), the handler silently swallows the error, and the dashboard
# renders zeros for those three fields while totalRequests / egressBytes
# (sourced from the InferenceRelay CR status) display correctly.
#
# Reproduction: api-labeled pod -> relay-router:8080 connection timeout;
# workspace-labeled pod -> HTTP 200 in ~40ms. See upstream issue
# https://github.com/lenaxia/LLMSafeSpaces/issues/466 for the full repro
# and proposed chart fix.
#
# This supplementary NetworkPolicy adds an Ingress rule allowing the API
# pods (selected by app.kubernetes.io/component=api + name=llmsafespaces)
# to reach the router on port 8080. K8s NetworkPolicy ingress rules are
# additive across multiple policies selecting the same pod, so this layers
# cleanly on top of the chart's policy without replacing it. Remove this
# file once the upstream chart fix is merged + a release rolls through.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: relay-router-allow-api-workaround
  namespace: llmsafespaces
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: relay-router
      app.kubernetes.io/name: llmsafespaces
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: api
              app.kubernetes.io/name: llmsafespaces
      ports:
        - port: 8080
          protocol: TCP
