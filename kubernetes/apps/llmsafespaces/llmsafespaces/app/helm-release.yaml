---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &appname llmsafespaces
  namespace: llmsafespaces
spec:
  interval: 15m
  chart:
    spec:
      # Chart is sourced from a GitRepository (kubernetes/flux/repositories/git/
      # llmsafespaces.yaml). The chart isn't published to a Helm/OCI registry.
      chart: ./charts/llmsafespaces
      sourceRef:
        kind: GitRepository
        name: llmsafespaces
        namespace: flux-system
      interval: 15m
      # Chart.yaml is pinned at 0.1.0 forever because it's never published.
      # Default reconcileStrategy=ChartVersion only re-packages on version
      # change, so source-controller would never re-package after a code
      # push — leaving helm-controller running against a stale chart
      # snapshot. Worklog c914dc2e first set this; PR-1d6975f9 (Epic 55)
      # accidentally dropped it; PR-451 surfaced the regression because
      # its migration 000004 never reached the ConfigMap. Track git
      # revisions so Flux re-packages on every commit.
      reconcileStrategy: Revision
  install:
    # CRDs are installed by Helm from the chart's crds/ directory on initial
    # install only (`Create`). For upgrades, CRD schema changes must be
    # applied out-of-band — Helm 3 intentionally does not upgrade CRDs in
    # crds/ to prevent data loss on schema migrations. To keep both paths
    # consistent, we also set `crds.install: false` below so the chart does
    # NOT render CRDs from templates/ on every reconcile.
    crds: Create
    createNamespace: false
    remediation:
      retries: 5
  upgrade:
    # `Skip` here mirrors Helm 3's default behavior for `crds/`. If a chart
    # version ever requires a CRD schema change, apply the new CRDs from
    # the chart source manually, then bump the HelmRelease chart version.
    crds: Skip
    remediation:
      retries: 5
  # The chart's externalSecret block defaults to .create: true and will
  # render its own Secret. We pre-create llmsafespaces-credentials via
  # secret.sops.yaml and tell the chart to reference it instead.
  values:
    namespace:
      create: false

    # ── Migrations ──────────────────────────────────────────────────────────
    # PR #457 (closes LLMSafeSpaces#455) replaces the broken libpq KV form
    # with a /bin/sh -ec wrapper that percent-encodes DB_USER + DB_PASSWORD
    # and exec's migrate against a postgres:// URL — works with the
    # standalone CLI in migrate/migrate:v4.17.1.
    # Combined with PR #458's reconcileStrategy docs (LLMSafeSpaces#456)
    # and the chart-source reconcileStrategy: Revision below, the chart's
    # pre-upgrade migrate Job is safe to re-enable.
    # (Default for this value is `true` in the chart; the override is
    # removed entirely. Block kept for context — delete if/when the
    # narrative becomes irrelevant.)
    # Schema was advanced out-of-band on 2026-06-29 to v=4 (apply via
    # talos-ops-prod helm-release commit 34464313's mitigation path); the
    # re-enabled Job is a no-op against an already-current schema.

    # ── Datastores ──────────────────────────────────────────────────────────
    postgresql:
      host: llmsafespacespg-rw.databases.svc.cluster.local
      port: 5432
      user: llmsafespaces
      database: llmsafespaces
      sslMode: disable
    redis:
      host: llmsafespaces-valkey.llmsafespaces.svc.cluster.local
      port: 6379
      db: 0

    externalSecret:
      create: false
      existingSecret: llmsafespaces-credentials

    # The migrate Job uses the API image. Chart appVersion (`0.1.0`) is a
    # placeholder — no such tag is published. We pin to a published ts-tag
    # from ghcr.io/lenaxia/llmsafespaces/api. To upgrade, check available
    # tags (note: ?n=200 truncates; use ?n=2000 to see recent ones):
    #   TOKEN=$(curl -s 'https://ghcr.io/token?\
    #     scope=repository%3Alenaxia%2Fllmsafespaces%2Fapi%3Apull&\
    #     service=ghcr.io' | jq -r .token)
    #   curl -sH "Authorization: Bearer $TOKEN" \
    #     https://ghcr.io/v2/lenaxia/llmsafespaces/api/tags/list?n=2000 \
    #     | jq -r '.tags[]' | grep ^ts- | sort | tail
    # To verify a tag's manifest is actually present (not just listed),
    # ghcr requires the OCI Accept header (plain GET returns 404):
    #   curl -sH "Authorization: Bearer $TOKEN" \
    #     -H "Accept: application/vnd.oci.image.index.v1+json" \
    #     -o /dev/null -w "%{http_code}\n" \
    #     https://ghcr.io/v2/lenaxia/llmsafespaces/api/manifests/ts-<TS>
    # Pick the largest verified ts-<unix-timestamp>.
    api:
      replicaCount: 2
      image:
        tag: ts-1782855556
      config:
        security:
          allowedOrigins:
            - https://chat.safespaces.dev
          allowCredentials: true

    controller:
      replicaCount: 1
      # Same ts-tag policy as api.image.tag above.
      image:
        tag: ts-1782855556
      # InferenceRelay router enabled; fleet (cloud VMs) is NOT provisioned.
      # The relay-router Deployment renders in this namespace and the
      # controller's InferenceRelay reconciler starts, but no InferenceRelay
      # CR exists yet — so the router has no peers and returns 503 for free-
      # model inference until one is created with provider credentials.
      # Prereqs already satisfied: rbac.scope=cluster (below) and the
      # InferenceRelay CRD is installed.
      # freeModelsRefresher still requires external egress + a published
      # Worker, so it stays off in this homelab deploy.
      inferenceRelay:
        enabled: true
        # Chart default tag falls back to appVersion (0.1.0) which doesn't
        # exist on ghcr.io/lenaxia/llmsafespaces/relay-router. Pin to the
        # same ts-tag as api/controller/frontend so the whole platform
        # rolls atomically. (Historical note: relay-router used to lag
        # because the per-image build matrix was opt-in; that's no longer
        # the case — every CI run on main produces all five images at the
        # same ts-tag.) To refresh, follow the api.image.tag procedure
        # above (substitute /relay-router for /api in the ghcr URLs).
        router:
          image:
            tag: ts-1782855556
      freeModelsRefresher:
        enabled: false

    # ── RBAC ────────────────────────────────────────────────────────────────
    # Chart default `rbac.scope: namespace` is broken for this chart: the
    # controller-runtime informer cache does cluster-wide list/watch on
    # Pods/Secrets/PVCs/ServiceAccounts by default, and the chart ships a
    # cluster-scoped CRD (RuntimeEnvironment). With namespace-scoped RBAC
    # the controller floods logs with `forbidden ... at the cluster scope`
    # and the watch loop never establishes. Switching to `cluster` grants
    # the controller cluster-wide list/watch — least-privilege correctness
    # vs functionality trade-off the chart should resolve internally.
    rbac:
      create: true
      scope: cluster

    # gVisor is not installed on the Talos workers. Workspace pods will run
    # under runc — fine for a single-operator deployment, NOT fine for
    # multi-tenant. Document the trade-off in chart values.
    gvisor:
      enabled: false

    # CRDs are installed by Helm from the chart's crds/ directory
    # (install.crds: Skip in the HelmRelease spec — see top of file). We
    # set this to false so the chart does NOT also render CRDs from
    # templates/ on every reconcile, which would cause a fight between
    # Helm's CRD installer and the templated objects.
    crds:
      install: false

    # ── Webhooks ────────────────────────────────────────────────────────────
    # Requires cert-manager. The chart creates a self-signed Issuer unless
    # we point it at an existing one. Self-signed is fine for the webhook
    # CA — cert-manager just needs to be installed (which it is, see
    # README-LLM § cert-manager).
    webhooks:
      enabled: true
      issuerKind: Issuer
      failurePolicy: Fail

    # ── Network policies ────────────────────────────────────────────────────
    # The chart ships default-deny ingress + DNS-allow egress for workspace
    # pods. Cilium honors NetworkPolicy CRs so leave this on.
    networkPolicy:
      enabled: true

    datastore:
      networkPolicy:
        # We don't run postgres or valkey with the chart's expected pod
        # labels (the chart looks for app=postgres / app=valkey). Disable
        # the chart's datastore policy and rely on the dedicated CNPG
        # cluster + dedicated Valkey StatefulSet being scoped to this
        # namespace already.
        enabled: false

    # ── Frontend ────────────────────────────────────────────────────────────
    # Enable the frontend deployment, but disable its built-in Ingress —
    # we render a Traefik Ingress separately (ingress-frontend.yaml) so we
    # can apply this cluster's standard middleware chain + cert-manager
    # annotations consistently with every other app in the repo.
    frontend:
      enabled: true
      replicaCount: 1
      # Latest published frontend ts-tag. Frontend CI runs separately from
      # api/controller, hence the lag — but for Epic 55 they are pinned
      # together to the same merge-commit tag because the kind/slug wire
      # format must roll out atomically across all three.
      image:
        tag: ts-1782855556
      apiBaseUrl: https://api.safespaces.dev/api/v1
      ingress:
        enabled: false

    # ── MCP server ──────────────────────────────────────────────────────────
    # Disabled — we don't expose MCP from this deployment. When off, the
    # chart renders neither the mcp Deployment nor the Service.
    mcp:
      enabled: false

    # ── Workspace runtime images ────────────────────────────────────────────
    # The chart seeds a `base` RuntimeEnvironment CR pointing at the base
    # workspace runtime image. Like api/controller/frontend, the default tag
    # falls back to Chart.AppVersion (0.1.0) which doesn't exist on ghcr —
    # workspace pods crash-loop on Init:ErrImagePull without an override.
    # Pinning to latest published ts-tag as of 2026-06-26. Refresh procedure:
    # see the api.image.tag comment above (substitute /base for /api in the
    # tags-list URL).
    runtimeEnvironments:
      base:
        image:
          tag: ts-1782855556

    # ── Inference relay ─────────────────────────────────────────────────────
    # The chart's DEFAULT inferenceRelayURL is `https://relay.safespaces.dev`
    # — that's the chart author's own CF Worker, NOT ours. Override to empty
    # so workspace pods don't hit a relay we don't control. With
    # controller.inferenceRelay.enabled: true above and this left empty, the
    # chart derives the cross-namespace FQDN
    #   http://relay-router.llmsafespaces.svc.cluster.local:8080
    # for workspace pods to reach the in-cluster router. Until an
    # InferenceRelay CR is created and peers are healthy, the router has no
    # backends and free-model inference will 503 (acceptable for the
    # router-only stage — no fleet provisioned yet).
    inferenceRelayURL: ""

    # ── Subdomain routing ───────────────────────────────────────────────────
    # Disabled — single-host frontend per design call. If we ever want
    # per-org SSO subdomain routing, flip this on and add a wildcard cert.
    orgSubdomainRouting:
      enabled: false

    # ── Monitoring ──────────────────────────────────────────────────────────
    # The cluster runs kube-prometheus-stack with sidecar dashboard import.
    # The chart's defaults work as-is — opt in.
    monitoring:
      enabled: true
      dashboards:
        enabled: true
        labels:
          grafana_dashboard: "1"
      datasources:
        enabled: false   # we already have a postgres datasource via the operator
      prometheusRules:
        enabled: true
      serviceMonitors:
        enabled: true
        # The chart's agentd PodMonitor template uses `endpoints:` instead
        # of `podMetricsEndpoints:` — `endpoints` is the ServiceMonitor
        # field name; PodMonitor has always used `podMetricsEndpoints`.
        # Prometheus Operator's strict CRD validation rejects it.
        # Disable until upstream fixes the template.
        agentdPodMonitor:
          enabled: false
