---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &appname llmsafespaces
  namespace: llmsafespaces
spec:
  interval: 15m
  chart:
    spec:
      # Chart is sourced from a GitRepository (kubernetes/flux/repositories/git/
      # llmsafespaces.yaml). The chart isn't published to a Helm/OCI registry.
      chart: ./charts/llmsafespaces
      sourceRef:
        kind: GitRepository
        name: llmsafespaces
        namespace: flux-system
      interval: 15m
  install:
    # CRDs are installed by Helm from the chart's crds/ directory on initial
    # install only (`Create`). For upgrades, CRD schema changes must be
    # applied out-of-band — Helm 3 intentionally does not upgrade CRDs in
    # crds/ to prevent data loss on schema migrations. To keep both paths
    # consistent, we also set `crds.install: false` below so the chart does
    # NOT render CRDs from templates/ on every reconcile.
    crds: Create
    createNamespace: false
    remediation:
      retries: 5
  upgrade:
    # `Skip` here mirrors Helm 3's default behavior for `crds/`. If a chart
    # version ever requires a CRD schema change, apply the new CRDs from
    # the chart source manually, then bump the HelmRelease chart version.
    crds: Skip
    remediation:
      retries: 5
  # The chart's externalSecret block defaults to .create: true and will
  # render its own Secret. We pre-create llmsafespaces-credentials via
  # secret.sops.yaml and tell the chart to reference it instead.
  values:
    namespace:
      create: false

    # ── Datastores ──────────────────────────────────────────────────────────
    postgresql:
      host: llmsafespacespg-rw.databases.svc.cluster.local
      port: 5432
      user: llmsafespaces
      database: llmsafespaces
      sslMode: disable
    redis:
      host: llmsafespaces-valkey.llmsafespaces.svc.cluster.local
      port: 6379
      db: 0

    externalSecret:
      create: false
      existingSecret: llmsafespaces-credentials

    # The migrate Job uses the API image; the API image's tag falls back to
    # Chart.AppVersion (0.1.0). Pin a real published API tag here when the
    # project starts cutting them — for now we accept the appVersion default.
    api:
      replicaCount: 2
      config:
        security:
          allowedOrigins:
            - https://chat.safespaces.dev
          allowCredentials: true

    controller:
      replicaCount: 1
      # InferenceRelay + free-models refresher require external internet
      # egress + a published Worker. Leave both off in this homelab deploy.
      inferenceRelay:
        enabled: false
      freeModelsRefresher:
        enabled: false

    # gVisor is not installed on the Talos workers. Workspace pods will run
    # under runc — fine for a single-operator deployment, NOT fine for
    # multi-tenant. Document the trade-off in chart values.
    gvisor:
      enabled: false

    # CRDs are installed by Helm from the chart's crds/ directory
    # (install.crds: Skip in the HelmRelease spec — see top of file). We
    # set this to false so the chart does NOT also render CRDs from
    # templates/ on every reconcile, which would cause a fight between
    # Helm's CRD installer and the templated objects.
    crds:
      install: false

    # ── Webhooks ────────────────────────────────────────────────────────────
    # Requires cert-manager. The chart creates a self-signed Issuer unless
    # we point it at an existing one. Self-signed is fine for the webhook
    # CA — cert-manager just needs to be installed (which it is, see
    # README-LLM § cert-manager).
    webhooks:
      enabled: true
      issuerKind: Issuer
      failurePolicy: Fail

    # ── Network policies ────────────────────────────────────────────────────
    # The chart ships default-deny ingress + DNS-allow egress for workspace
    # pods. Cilium honors NetworkPolicy CRs so leave this on.
    networkPolicy:
      enabled: true

    datastore:
      networkPolicy:
        # We don't run postgres or valkey with the chart's expected pod
        # labels (the chart looks for app=postgres / app=valkey). Disable
        # the chart's datastore policy and rely on the dedicated CNPG
        # cluster + dedicated Valkey StatefulSet being scoped to this
        # namespace already.
        enabled: false

    # ── Frontend ────────────────────────────────────────────────────────────
    # Enable the frontend deployment, but disable its built-in Ingress —
    # we render a Traefik Ingress separately (ingress-frontend.yaml) so we
    # can apply this cluster's standard middleware chain + cert-manager
    # annotations consistently with every other app in the repo.
    frontend:
      enabled: true
      replicaCount: 1
      apiBaseUrl: https://api.safespaces.dev/api/v1
      ingress:
        enabled: false

    # ── MCP server ──────────────────────────────────────────────────────────
    # Disabled — we don't expose MCP from this deployment. When off, the
    # chart renders neither the mcp Deployment nor the Service.
    mcp:
      enabled: false

    # ── Inference relay ─────────────────────────────────────────────────────
    # The chart's DEFAULT inferenceRelayURL is `https://relay.safespaces.dev`
    # — that's the chart author's own CF Worker, NOT ours. Override to empty
    # so workspace pods don't hit a relay we don't control. Combined with
    # controller.inferenceRelay.enabled: false above, free-model inference
    # via the relay fleet is fully disabled in this deploy.
    inferenceRelayURL: ""

    # ── Subdomain routing ───────────────────────────────────────────────────
    # Disabled — single-host frontend per design call. If we ever want
    # per-org SSO subdomain routing, flip this on and add a wildcard cert.
    orgSubdomainRouting:
      enabled: false

    # ── Monitoring ──────────────────────────────────────────────────────────
    # The cluster runs kube-prometheus-stack with sidecar dashboard import.
    # The chart's defaults work as-is — opt in.
    monitoring:
      enabled: true
      dashboards:
        enabled: true
        labels:
          grafana_dashboard: "1"
      datasources:
        enabled: false   # we already have a postgres datasource via the operator
      prometheusRules:
        enabled: true
      serviceMonitors:
        enabled: true
