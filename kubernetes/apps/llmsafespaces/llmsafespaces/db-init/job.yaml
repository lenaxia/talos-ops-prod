---
# Provisions the `llmsafespaces` Postgres role + database on the dedicated
# `llmsafespacespg` CloudNative-PG cluster. Uses onedr0p/postgres-init which:
#   - connects to INIT_POSTGRES_HOST as `postgres` superuser
#   - creates role INIT_POSTGRES_USER if missing
#   - sets that role's password to INIT_POSTGRES_PASS
#   - creates database INIT_POSTGRES_DBNAME owned by that role
#
# Re-runs are idempotent.
#
# ORDERING (critical):
#   The llmsafespaces chart renders a `pre-install,pre-upgrade` Helm-hook Job
#   (templates/migration-job.yaml) that connects to the SAME role+database
#   using credentials from llmsafespaces-credentials. If the role/DB doesn't
#   exist yet, that hook fails and the HelmRelease never reconciles.
#
#   We therefore run this Job from a DIFFERENT Flux Kustomization
#   (`cluster-llmsafespaces-db-init`, see ../ks.yaml) and the chart's
#   parent Kustomization (`cluster-llmsafespaces-app`) declares
#   `dependsOn: cluster-llmsafespaces-db-init`. Flux waits for this Job to
#   reach a Healthy state (via the healthCheck on db-init's Kustomization)
#   before reconciling the HelmRelease.
apiVersion: batch/v1
kind: Job
metadata:
  name: llmsafespaces-postgres-init
  namespace: llmsafespaces
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: llmsafespaces-postgres-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: postgres-init
          image: ghcr.io/onedr0p/postgres-init:17.4
          env:
            - name: INIT_POSTGRES_HOST
              value: llmsafespacespg-rw.databases.svc.cluster.local
            - name: INIT_POSTGRES_DBNAME
              value: llmsafespaces
            - name: INIT_POSTGRES_USER
              value: llmsafespaces
            - name: INIT_POSTGRES_SUPER_PASS
              valueFrom:
                secretKeyRef:
                  name: postgres-superuser
                  key: password
            - name: INIT_POSTGRES_PASS
              valueFrom:
                secretKeyRef:
                  name: llmsafespaces-credentials
                  key: postgres-password
