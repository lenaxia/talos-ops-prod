name: Issue Responder

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  respond:
    if: |
      github.event.sender.login == 'lenaxia' &&
      (github.event_name == 'issues' ||
       github.event_name == 'pull_request' ||
       (github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '/ai')) ||
       (github.event_name == 'pull_request_review_comment' && startsWith(github.event.comment.body, '/ai')))
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run OpenCode
        uses: anomalyco/opencode/github@0cf0294787322664c6d668fa5ab0a9ce26796f78 # github-v1.2.9
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: openai/${{ vars.OPENAI_MODEL }}
          use_github_token: "true"
          share: "false"
          prompt: |
            You are an AI assistant for the talos-ops-prod repository. A new GitHub issue or comment has been opened. Analyze it and take the appropriate action.

            Repository: talos-ops-prod — a Talos Linux Kubernetes cluster managed with Flux GitOps. Single maintainer: @lenaxia.

            Key directories:
            - kubernetes/         — all cluster manifests (Helm releases, Kustomizations, namespaces)
            - .taskfiles/         — Task scripts for cluster operations
            - .github/            — workflows and actions
            - bootstrap/          — cluster bootstrap configuration
            - config.yaml         — main configuration file
            - authelia/           — Authelia-specific charts and configuration

            Common workflows:
            - Deploy a new app: create kubernetes/apps/<namespace>/<app-name>/{namespace,helmrelease,kustomization}.yaml
            - Update config: modify existing YAML files, Helm values, annotations
            - Create/modify workflows: .github/workflows/<name>.yml following existing patterns
            - Cluster changes: update bootstrap/ or kubernetes/ structure

            Rules:
            1. Always post a comment on the issue or PR thread with your response before finishing.
            2. For any code or file changes: create a feature branch and open a PR — never commit directly to main. Branch naming: feat/issue-{number}-<short-description>. PR body must include "Closes #{number}".
            3. Never handle or create secrets. If secrets are needed, ask the user to handle them separately using SOPS/AGE encryption.
            4. If responding to a PR comment triggered by /ai: strip the /ai prefix, focus on the specific request, use the PR diff for context, and use github_pull_request_review_write for review comments if appropriate.
            5. If the request is ambiguous, ask for clarification in a comment rather than guessing.
            6. Use the checked-out repository to read source files and understand the current implementation before answering questions or proposing changes.
            7. This repo uses Flux for GitOps, bjw-s common library Helm chart pattern, and SOPS for secrets.

            Analyze this issue or comment, determine what action to take (answer a question, implement a change, ask for clarification), and execute it.
