---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

tasks:

  arch:
    desc: Set up Arch Linux tools
    cmd: >
      {{.PKGMGR}} -Syu --needed --noconfirm --noprogressbar
      $(cat {{.ROOT_DIR}}/.taskfiles/workstation/Archfile | xargs)
    vars:
      PKGMGR:
        sh: which paru || which yay
    preconditions:
      - test -f {{.ROOT_DIR}}/.taskfiles/workstation/Archfile
      - which paru || which yay

  brew:
    desc: Set up Homebrew tools
    cmd: brew bundle --file {{.ROOT_DIR}}/.taskfiles/workstation/Brewfile
    sources:
      - '{{.ROOT_DIR}}/.taskfiles/workstation/Brewfile'
    generates:
      - '{{.ROOT_DIR}}/.taskfiles/workstation/Brewfile.lock.json'
    preconditions:
      - test -f {{.ROOT_DIR}}/.taskfiles/workstation/Brewfile
      - which brew

  direnv:
    desc: Set up direnv hooks
    cmd: direnv allow .
    status:
      - '[[ $(direnv status --json | jq ".state.foundRC.allowed") == 0 ]]'
      - '[[ $(direnv status --json | jq ".state.loadedRC.allowed") == 0 ]]'
    preconditions:
      - which direnv

  generic-linux:
    desc: Set up CLI tools into the projects .bin directory
    dir: '{{.ROOT_DIR}}/.bin'
    platforms: ['linux/amd64', 'linux/arm64']
    cmds:
      # Install CLI tools directly from GitHub releases. Previously this used
      # the i.jpillora.com installer proxy, which is a third-party service that
      # has become unreliable (returning 500s). Going direct to the GitHub API
      # removes a runtime dependency and is the same source the proxy used.
      # Each `gh_release_install` call fetches the latest release from
      # api.github.com and picks the asset whose name matches the local arch.
      - cmd: |
          set -euo pipefail
          ARCH=$(uname -m)
          case "$ARCH" in
              x86_64)         ARCH='amd64' ;;
              aarch64|arm64)  ARCH='arm64' ;;
              *) echo "unsupported arch: $ARCH" >&2; exit 1 ;;
          esac
          gh_release_install() {
              local repo="$1" name="$2" asset_re="$3"
              local release
              release=$(curl -fsSL "https://api.github.com/repos/${repo}/releases/latest")
              local url
              url=$(printf '%s' "$release" \
                  | jq -r --arg arch "$ARCH" --arg re "$asset_re" \
                      '.assets[] | select(.name|test($re)) | select(.name|test($arch;"i")) | .browser_download_url' \
                  | head -n1)
              if [ -z "$url" ]; then
                  echo "no asset matched repo=$repo arch=$ARCH pattern=$asset_re" >&2
                  return 1
              fi
              echo "installing $name from $url"
              case "$url" in
                  *.tar.gz|*.tgz)
                      curl -fsSL "$url" | tar xzf - -O > "$name" 2>/dev/null \
                          || curl -fsSL "$url" | tar xzf - --strip-components=1 -C . 2>/dev/null \
                          || curl -fsSL -o "${name}.tar.gz" "$url" && tar xzf "${name}.tar.gz" && rm -f "${name}.tar.gz"
                      ;;
                  *)
                      curl -fsSL -o "$name" "$url"
                      ;;
              esac
              chmod +x "$name" 2>/dev/null || true
          }
          export -f gh_release_install
          export ARCH
          gh_release_install budimanjojo/talhelper        talhelper    'talhelper.*linux'
          gh_release_install cloudflare/cloudflared       cloudflared  'cloudflared.*linux'
          gh_release_install FiloSottile/age              age          "age.*-${ARCH}.*linux"
          gh_release_install fluxcd/flux2                 flux         'flux_.*linux'
          gh_release_install helmfile/helmfile            helmfile     "helmfile_.*linux_${ARCH}"
          gh_release_install jqlang/jq                    jq           "jq-linux-${ARCH}"
          gh_release_install kubernetes-sigs/kustomize    kustomize    "kustomize_.*_?linux_${ARCH}"
          gh_release_install mikefarah/yq                 yq           "yq_linux_${ARCH}"
          gh_release_install siderolabs/talos             talosctl     "talosctl-linux-${ARCH}"
          gh_release_install yannh/kubeconform            kubeconform  "kubeconform.*linux.*${ARCH}"
      - cmd: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl";
          curl -sSfL -o sops https://github.com/getsops/sops/releases/download/v3.11.0/sops-v3.11.0.linux.amd64
        platforms: ['linux/amd64']
      - cmd: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/arm64/kubectl";
          curl -sSfL -o sops https://github.com/getsops/sops/releases/download/v3.11.0/sops-v3.11.0.linux.arm64
        platforms: ['linux/arm64']
      - cmd: chmod +x kubectl sops
      - cmd: curl -sSfL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      - cmd: curl -sSfL https://github.com/mitsuhiko/minijinja/releases/latest/download/minijinja-cli-installer.sh | bash
    env:
      MINIJINJA_CLI_INSTALL_DIR: '.'
      MINIJINJA_CLI_UNMANAGED_INSTALL: 'true'
      HELM_INSTALL_DIR: '.'
      USE_SUDO: 'false'

  venv:
    desc: Set up virtual environment
    cmds:
      - python3 -m venv {{.VIRTUAL_ENV}}
      - '{{.VIRTUAL_ENV}}/bin/python3 -m pip install --upgrade pip setuptools wheel'
      - '{{.VIRTUAL_ENV}}/bin/python3 -m pip install --upgrade --requirement "{{.ROOT_DIR}}/requirements.txt"'
    sources:
      - '{{.ROOT_DIR}}/requirements.txt'
    generates:
      - '{{.VIRTUAL_ENV}}/pyvenv.cfg'
    preconditions:
      - test -f {{.ROOT_DIR}}/requirements.txt
      - which python3
